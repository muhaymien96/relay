  card.append(secWrap);
  card.append(h('div', { style: 'margin-top:18px' },
    h('button', { class: 'btn', onclick: async () => {
      if (!await modal.confirm(`Delete environment "${env.name}"?`, { danger: true, ok: 'Delete' })) return;
      await api('/api/environments/' + encodeURIComponent(env.name), { method: 'DELETE' });
      await refresh(); renderEnvView();
    } }, 'Delete environment')));
  work.append(card);
}
const saveEnv = debounce(async (env) => {
  try { await api('/api/environments/' + encodeURIComponent(env.name), { method: 'PUT', body: env }); }
  catch (e) { toast(e.message, true); }
}, 400);

/* ---------- presets view ---------- */
function renderPresetView(id) {
  S.presetId = id ?? S.presetId;
  renderSide();
  $('crumb').innerHTML = ''; $('crumb').append('Workspace / ', h('b', {}, 'Header Presets'));
  const work = $('work'); $('meta').hidden = true; work.innerHTML = '';
  const p = S.state.presets.find(x => x.id === S.presetId);
  if (!p) { work.append(h('div', { class: 'empty' }, 'Select a preset, or create one with +.')); return; }

  const card = h('div', { class: 'card', style: 'padding:16px' });
  const save = debounce(async () => {
    try { await api('/api/presets/' + p.id, { method: 'PUT', body: p }); await refresh(); }
    catch (e) { toast(e.message, true); }
  }, 400);

  card.append(h('div', { style: 'display:flex;gap:10px;align-items:center;margin-bottom:4px' },
    h('h2', { style: 'margin:0;font-family:var(--mono)' }, p.name),
    h('button', { class: 'btn', style: 'margin-left:auto', onclick: async () => {
      if (!await modal.confirm(`Delete preset "${p.name}"?`, { danger: true, ok: 'Delete' })) return;
      await api('/api/presets/' + p.id, { method: 'DELETE' }); S.presetId = null; await refresh(); renderPresetView();
    } }, 'Delete'),
    h('button', { class: 'btn dark', onclick: () => save() }, 'Save changes')));
  card.append(h('input', { type: 'text', value: p.description || '', placeholder: 'Description…',
    style: 'width:100%;margin-bottom:14px', onchange: (e) => { p.description = e.target.value; save(); } }));

  card.append(h('div', { class: 'lbl', style: 'font-size:10px;letter-spacing:.1em;color:var(--dim);font-weight:700;margin-bottom:6px' }, 'CONFIGURED HEADERS'));
  const table = h('table', { class: 'kv' },
    h('tr', {}, h('th', { style: 'width:30%' }, 'Key'), h('th', {}, 'Value'), h('th', { style: 'width:54px' }, 'Secret'), h('th', { style: 'width:30px' }, '')));
  const sync = () => {
    p.headers = [];
    for (const tr of table.querySelectorAll('tr[data-row]')) {
      const [k, v] = tr.querySelectorAll('input[type=text], input[type=password]');
      const lock = tr.querySelector('.secLock');
      if (k.value.trim()) p.headers.push({ key: k.value.trim(), value: v.value, secret: lock.classList.contains('on') });
    }
    save();
  };
  const addRow = (hd = { key: '', value: '', secret: false }) => {
    const lock = h('button', { class: 'secLock' + (hd.secret ? ' on' : ''), title: 'Mark secret',
      onclick: (e) => { e.preventDefault(); lock.classList.toggle('on'); sync(); } }, '🔒');
    table.append(h('tr', { 'data-row': 1 },
      h('td', {}, h('input', { type: 'text', value: hd.key, placeholder: 'Authorization', onchange: sync })),
      h('td', {}, h('input', { type: hd.secret ? 'password' : 'text', value: hd.value,
        placeholder: hd.secret ? '(unchanged)' : 'Bearer {{token}}', onchange: sync })),
      h('td', { style: 'text-align:center' }, lock),
      h('td', {}, h('button', { class: 'delRow', onclick: (e) => { e.target.closest('tr').remove(); sync(); } }, '✕'))));
  };
  (p.headers || []).forEach(addRow);
  card.append(table, h('button', { class: 'addRow', onclick: () => addRow() }, '+ Add additional header'));

  card.append(h('div', { class: 'lbl', style: 'font-size:10px;letter-spacing:.1em;color:var(--dim);font-weight:700;margin:18px 0 6px' }, 'ATTACHED TO'));
  const chips = h('div', { class: 'chips' });
  const isAttached = (test) => (p.attachments || []).some(test);
  for (const c of S.state.collections || []) {
    const on = isAttached(a => a.collectionId === c.id);
    chips.append(h('button', { class: 'att' + (on ? ' on' : ''), onclick: () => {
      p.attachments = on ? p.attachments.filter(a => a.collectionId !== c.id)
        : [...(p.attachments || []), { collectionId: c.id }];
      save(); renderPresetView();
    } }, '🗀 ' + c.name));
    for (const f of c.folders) {
      const fOn = isAttached(a => a.folderId === f.id);
      chips.append(h('button', { class: 'att' + (fOn ? ' on' : ''), onclick: () => {
        p.attachments = fOn ? p.attachments.filter(a => a.folderId !== f.id)
          : [...(p.attachments || []), { folderId: f.id }];
        save(); renderPresetView();
      } }, '🗀 ' + c.name + ' / ' + f.name));
    }
  }
  card.append(chips);
  card.append(h('div', { class: 'note', style: 'margin-top:14px' },
    'Presets applied at the folder level are inherited by all requests within that folder unless overridden. Secret values are stored locally and never shown or exported.'));
  work.append(card);
}

/* ---------- shared assertion editor (request editor + test management) ---------- */
// sampleResponseFor returns a parsed JSON sample of the last real response
// for `full` ({id, spec, ...}), used by the clickable response-tree
// assertion authoring. Returns null when no JSON sample is available yet.
function sampleResponseFor(full) {
  let body = null;
  if (S.req && S.req.id === full.id && S.last) body = S.last.body;
  else if (S.lastTestRun && S.lastTestRun.id === full.id) body = S.lastTestRun.result.body;
  if (body == null) return null;
  try { return JSON.parse(body); } catch { return null; }
}

let asrtView = 'visual';

function buildAssertionsEditor(full, spec, save) {
  spec.assertions = (spec.assertions || []).map(normalizeAssertion);
  const container = h('div', {});

  function redraw() {
    container.innerHTML = '';
    const asserts = spec.assertions;
    const switcher = h('div', { class: 'viewSeg' },
      ...[['visual', 'Visual'], ['cel', 'CEL'], ['script', 'Script']].map(([v, l]) =>
        h('button', { class: asrtView === v ? 'on' : '', onclick: () => { asrtView = v; redraw(); } }, l)));
    const sample = sampleResponseFor(full);
    const fromBtn = h('button', { class: 'fromRespBtn',
      title: sample ? 'Build assertions by clicking values in the last response' : 'Run this test to enable response-based assertions',
      onclick: () => {
        if (!sample) { toast('Run this test first to capture a sample response', true); return; }
        openAssertFromResponse(sample, (a) => { spec.assertions.push(a); save(); redraw(); });
      } }, '⊕ From response');
    if (!sample) fromBtn.disabled = true;
    container.append(h('div', { style: 'display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap' },
      h('div', { class: 'lbl', style: 'font-size:10px;letter-spacing:.1em;color:var(--dim);font-weight:700' }, 'ASSERTIONS'),
      h('span', { class: 'n', style: 'background:var(--ink-soft);color:var(--ink);border-radius:99px;font-size:10px;padding:0 6px' }, String(asserts.length)),
      h('span', { style: 'flex:1' }), fromBtn, switcher));

    if (asrtView === 'cel') {
      container.append(
        h('div', { class: 'compiledHd' }, h('span', { class: 'lang' }, 'CEL'),
          h('span', {}, 'cel-go predicate preview · read-only · generated from the visual rows below')),
        h('pre', { class: 'celPre', html: hlCEL(assertionsToCEL(asserts)) }),
        h('div', { class: 'note', style: 'margin-top:8px' }, 'Edit the Visual rows to regenerate this preview.'));
      return;
    }
    if (asrtView === 'script') {
      container.append(
        h('div', { class: 'compiledHd' }, h('span', { class: 'lang' }, 'JS'),
          h('span', {}, 'goja/Sobek runtime · relay.* API · read-only preview')),
        h('pre', { class: 'celPre' }, assertionsToScript(spec.name || 'test', asserts)),
        h('div', { class: 'note', style: 'margin-top:8px' }, 'Edit the Visual rows — or add a Script-type assertion there — to change behavior.'));
      return;
    }

    // visual
    const tbody = h('tbody');
    asserts.forEach((a, i) => tbody.append(assertRow(a, i)));
    container.append(
      h('table', { class: 'asrt' },
        h('thead', {}, h('tr', {}, h('th', { style: 'width:88px' }, 'Type'), h('th', {}, 'Condition'), h('th', { style: 'width:30px' }, ''))),
        tbody),
      h('button', { class: 'addRow', onclick: (e) => showAddAssertionMenu(e) }, '+ Add assertion'));

    function refreshCelLine(i, a) {
      const el = container.querySelector('#cel-' + i);
      if (el) el.innerHTML = hlCEL(toCEL(a) || '');
    }
    function txt(val, cls, ph, set, i, a) {
      return h('input', { type: 'text', class: cls, value: val ?? '', placeholder: ph || '',
        oninput: (e) => { set(e.target.value); refreshCelLine(i, a); }, onchange: () => save() });
    }
    function opSelect(a) {
      const sel = h('select', { onchange: (e) => { a.op = e.target.value; save(); redraw(); } });
      for (const [val, lbl] of Object.entries(OPS[a.type] || {})) sel.append(h('option', { value: val, selected: val === a.op ? '' : undefined }, lbl));
      return sel;
    }
    function subOpSelect(a) {
      const sel = h('select', { onchange: (e) => { a.sub = e.target.value; save(); } });
      for (const [val, lbl] of Object.entries(SUBOPS)) sel.append(h('option', { value: val, selected: val === (a.sub || '==') ? '' : undefined }, lbl));
      return sel;
    }
    function assertRow(a, i) {
      if (a.type === 'script') {
        return h('tr', {},
          h('td', {}, h('span', { class: 'asrtType script' }, 'Script')),
          h('td', { colspan: '2' }, h('textarea', { class: 'scriptEd', spellcheck: 'false',
            oninput: (e) => { a.code = e.target.value; save(); } }, a.code || "pm.test('custom check', () => {\n  pm.expect(true).to.be.true;\n});")),
          h('td', {}, h('button', { class: 'delRow', onclick: () => { spec.assertions.splice(i, 1); save(); redraw(); } }, '✕')));
      }
      let fields;
      if (a.type === 'status') {
        fields = h('div', { class: 'asrtFields' }, opSelect(a),
          a.op === 'exists' ? null : txt(a.exp, 'exp', a.op === 'oneof' ? '200, 404' : '200', v => a.exp = v, i, a));
      } else if (a.type === 'header') {
        fields = h('div', { class: 'asrtFields' },
          txt(a.name, 'path', 'Header-Name', v => a.name = v, i, a), opSelect(a),
          a.op === 'exists' ? null : txt(a.exp, 'exp', 'value', v => a.exp = v, i, a));
      } else if (a.type === 'json') {
        fields = h('div', { class: 'asrtFields' },
          txt(a.path, 'path', '$.result.status', v => a.path = v, i, a), opSelect(a),
          a.op === 'exists' ? null : txt(a.exp, 'exp', 'expected', v => a.exp = v, i, a));
      } else if (a.type === 'text') {
        fields = h('div', { class: 'asrtFields' }, opSelect(a), txt(a.exp, 'exp', 'text', v => a.exp = v, i, a));
      } else if (a.type === 'timing') {
        fields = h('div', { class: 'asrtFields' },
          h('span', { class: 'unit' }, 'total'), opSelect(a),
          txt(a.exp, 'exp', '2000', v => a.exp = v, i, a), h('span', { class: 'unit' }, 'ms'));
      } else if (a.type === 'forall' || a.type === 'exists') {
        fields = h('div', { class: 'asrtFields' },
          txt(a.path, 'path', '$.checks', v => a.path = v, i, a),
          h('span', { class: 'unit' }, a.type === 'forall' ? '∀ item .' : '∃ item .'),
          txt(a.field, 'exp', 'field', v => a.field = v, i, a),
          subOpSelect(a), txt(a.exp, 'exp', 'value', v => a.exp = v, i, a));
      } else if (a.type === 'count') {
        fields = h('div', { class: 'asrtFields' },
          h('span', { class: 'unit' }, 'size('), txt(a.path, 'path', '$.matches', v => a.path = v, i, a),
          h('span', { class: 'unit' }, ')'), opSelect(a), txt(a.exp, 'exp', '0', v => a.exp = v, i, a));
      }
      return h('tr', {},
        h('td', {}, h('span', { class: 'asrtType ' + a.type }, TYPE_LABEL[a.type] || a.type)),
        h('td', {}, fields, h('div', { class: 'celLine', id: 'cel-' + i, html: hlCEL(toCEL(a) || '') })),
        h('td', {}, h('button', { class: 'delRow', onclick: () => { spec.assertions.splice(i, 1); save(); redraw(); } }, '✕')));
    }
    function showAddAssertionMenu(e) {
      e.stopPropagation();
      ctxMenu.show(e.clientX, e.clientY, ASRT_TYPES.map(t => ({
        icon: '', label: TYPE_LABEL[t],
        action: () => { spec.assertions.push({ ...ASRT_DEFAULTS[t] }); save(); redraw(); },
      })));
    }
  }
  redraw();
  return container;
}

// traceCardSection renders the Traceability card wired to the real Xray /
// Jira endpoints: link an existing test, create a new Xray test issue, and
// link Jira requirement issues.
function traceCardSection(full, spec, save) {
  const card = h('div', { class: 'card', style: 'padding:14px' },
    h('div', { class: 'lbl', style: 'font-size:10px;letter-spacing:.1em;color:var(--dim);font-weight:700;margin-bottom:8px' }, 'TRACEABILITY'));
  const statusLine = h('div', {});
  const renderStatus = () => {
    statusLine.innerHTML = '';
    statusLine.append(spec.xrayKey
      ? h('span', { class: 'valMsg ok' }, '✓ Linked to ' + spec.xrayKey)
      : h('span', { class: 'valMsg bad' }, '✕ Not linked to Xray'));
  };
  renderStatus();
  card.append(statusLine);

  const reqChips = h('div', { class: 'chips', style: 'margin-top:10px' });
  const renderReqs = () => {
    reqChips.innerHTML = '';
    for (const rq of spec.requirements || []) {
      reqChips.append(h('span', { class: 'att on' }, rq + ' ',
        h('button', { class: 'delRow', title: 'Remove from this list (does not unlink in Jira)',
          onclick: () => { spec.requirements = spec.requirements.filter(x => x !== rq); save(); renderReqs(); } }, ' ✕')));
    }
    if (!(spec.requirements || []).length) reqChips.append(h('span', { style: 'color:var(--faint);font-size:12px' }, 'No linked requirements yet.'));
  };
  renderReqs();

  card.append(h('div', { class: 'traceActions' },
    h('button', { class: 'btn sm', onclick: async () => {
      const key = await modal.prompt('Link existing Xray test', { placeholder: 'AML-T142', value: spec.xrayKey || '' });
      if (!key) return;
      try {
        const ref = await api('/api/xray/test?key=' + encodeURIComponent(key));
        if (!ref) { toast('No Xray test found for ' + key, true); return; }
        spec.xrayKey = key; save(); renderStatus();
        toast('Linked to ' + key + (ref.summary ? ' — ' + ref.summary : ''));
      } catch (e) { toast(e.message, true); }
    } }, 'Link existing test'),
    h('button', { class: 'btn sm', onclick: async () => {
      try {
        const r = await api('/api/xray/test', { method: 'POST', body: { requestId: full.id, summary: spec.name } });
        spec.xrayKey = r.xrayKey; renderStatus();
        toast('Created Xray test ' + r.xrayKey);
      } catch (e) { toast(e.message, true); }
    } }, 'Create Xray issue'),
    h('button', { class: 'btn sm', onclick: async () => {
      if (!spec.xrayKey) { toast('Link or create an Xray test first', true); return; }
      const raw = await modal.prompt('Requirement keys (comma separated)', { placeholder: 'AML-1, AML-2' });
      if (!raw) return;
      const keys = raw.split(',').map(s => s.trim()).filter(Boolean);
      if (!keys.length) return;
      try {
        const r = await api('/api/xray/requirements/link', { method: 'POST', body: { requestId: full.id, requirementKeys: keys } });
        spec.requirements = r.requirements; renderReqs();
        toast('Linked ' + keys.length + ' requirement' + (keys.length === 1 ? '' : 's'));
      } catch (e) { toast(e.message, true); }
    } }, 'Link requirements')));

  card.append(reqChips);
  card.append(h('div', { class: 'note', style: 'margin-top:10px' },
    'Linking/creating calls Xray and Jira directly. Configure project key and credentials in Settings → Xray Cloud.'));
  return card;
}
function openAssertionTypeMenu(anchor, onPick) {
  document.querySelectorAll('.asrtMenu').forEach(m => m.remove());
  const rect = anchor.getBoundingClientRect();
  const menu = h('div', { class: 'asrtMenu', style: `left:${Math.min(rect.left, window.innerWidth - 250)}px;top:${rect.bottom + 6}px` });
  for (const [type, cfg] of Object.entries(ASSERTION_TYPES)) {
    menu.append(h('button', { onclick: () => { menu.remove(); onPick(type); } },
      h('span', { class: 'asrtType ' + cfg.cls }, cfg.label), h('small', { style: 'color:var(--dim)' }, assertionCondition(cfg.defaults))));
  }
  document.body.append(menu);
  setTimeout(() => document.addEventListener('click', function close(e) {
    if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', close); }
  }), 0);
}

/* ---------- helpers ---------- */
function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}
async function copyText(text, label) {
  try { await navigator.clipboard.writeText(text); }
  catch {
    const ta = h('textarea', { style: 'position:fixed;opacity:0' }, text);
    document.body.append(ta); ta.select();
    document.execCommand('copy'); ta.remove();
  }
  toast(label + ' copied to clipboard');
}
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'collection'; }
function fmtSize(n) { return n < 1024 ? n + ' B' : n < 1048576 ? (n / 1024).toFixed(1) + ' KB' : (n / 1048576).toFixed(1) + ' MB'; }

document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); send(); }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') {
    e.preventDefault();
    if (S.req) saveRequest(true);
  }
});

/* ---------- collection context menu ---------- */
async function createRequestInCollection(colId) {
  try {
    const created = await api('/api/requests', { method: 'POST',
      body: { collectionId: colId, spec: { name: 'Untitled', method: 'GET', url: 'https://' } } });
    S.openCols.add(colId);
    await refresh();
    openRequest(created.id);
    toast('Request created');
  } catch (err) { toast(err.message, true); }
}

async function createFolderInCollection(colId) {
  try {
    const name = await modal.prompt('New folder name'); if (!name) return;
    await api('/api/folders', { method: 'POST', body: { collectionId: colId, name, headers: {}, vars: {} } });
    S.openCols.add(colId);
    await refresh();
    toast('Folder created');
  } catch (err) { toast(err.message, true); }
}

function showColCtx(e, c) {
  ctxMenu.show(e.clientX, e.clientY, [
    { icon: '+', label: 'New request', action: () => createRequestInCollection(c.id) },
    { icon: '+', label: 'New folder', action: () => createFolderInCollection(c.id) },
    '-',
    { icon: '▶', label: 'Run collection', action: () => runCollection(c) },
    { icon: '⚙', label: 'Settings', action: () => renderCollectionSettings(c) },
    '-',
    { icon: '↓', label: 'Export as Postman…', action: async () => {
      try {
        const text = await api(`/api/export?format=postman&collection=${c.id}&env=${encodeURIComponent(S.envName)}`);
        const blob = new Blob([JSON.stringify(text, null, 2)], { type: 'text/plain' });
        const a = h('a', { href: URL.createObjectURL(blob), download: slugify(c.name) + '.postman_collection.json' });
        a.click(); URL.revokeObjectURL(a.href); toast('Exported');
      } catch (err) { toast(err.message, true); }
    }},
    { icon: '↓', label: 'Export as OpenAPI…', action: async () => {
      try {
        const text = await api(`/api/export?format=openapi&collection=${c.id}&env=${encodeURIComponent(S.envName)}`);
        const blob = new Blob([JSON.stringify(text, null, 2)], { type: 'text/plain' });
        const a = h('a', { href: URL.createObjectURL(blob), download: slugify(c.name) + '.openapi.json' });
        a.click(); URL.revokeObjectURL(a.href); toast('Exported');
      } catch (err) { toast(err.message, true); }
    }},
    '-',
    { icon: '🗑', label: 'Delete collection', danger: true, action: async () => {
      if (!await modal.confirm(`Delete "${c.name}" and all its requests?`, { danger: true, ok: 'Delete' })) return;
      try {
        await api('/api/collections/' + c.id, { method: 'DELETE' });
        if (S.reqId && findReqMeta(S.reqId)?.col.id === c.id) { S.reqId = null; S.req = null; $('work').innerHTML = '<div class="empty">Select a request, or create one.</div>'; $('meta').hidden = true; }
        await refresh();
      } catch (err) { toast(err.message, true); }
    }},
  ]);
}

/* ---------- history context menu ---------- */
function showHistCtx(e, entry) {
  ctxMenu.show(e.clientX, e.clientY, [
    { icon: '↗', label: 'Inspect', action: () => showHistory(entry.id) },
    ...(entry.requestId ? [{ icon: '→', label: 'Open request', action: () => {
      S.view = 'collections';
      document.querySelector('[data-view=collections]').click();
      openRequest(entry.requestId);
    }}] : []),
    '-',
    { icon: '⧉', label: 'Copy URL', action: () => copyText(entry.url, 'URL') },
    { icon: '⧉', label: 'Copy method + URL', action: () => copyText(entry.method + ' ' + entry.url, 'Method + URL') },
  ]);
}

ctxMenu.init();
modal.init();
refresh().then(() => {
  if (S.state.collections[0]) {
    S.openCols.add(S.state.collections[0].id);
    renderSide();
    const first = S.state.collections[0].requests[0];
    if (first) openRequest(first.id);
  }
  loadHistory();
}).catch(e => toast(e.message, true));
