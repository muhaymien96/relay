<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Relay — API Workbench</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #f4f5fa; --panel: #ffffff; --line: #e6e8f2; --line2: #d9dcea;
    --fg: #1c1f33; --dim: #7c819a; --faint: #a4a8bd;
    --ink: #28287a; --ink-hover: #1d1d5e; --ink-soft: #eceefc;
    --green: #0e9f6e; --red: #d64545; --amber: #c26a1b; --blue: #2563eb; --purple: #7c3aed;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font: 13px/1.5 "Inter", system-ui, -apple-system, sans-serif;
         display: flex; flex-direction: column; }
  #app { flex: 1; display: flex; min-height: 0; }
  button { font: inherit; cursor: pointer; }
  input, select, textarea { font: inherit; color: var(--fg); }
  input[type=text], input[type=password], select, textarea {
    border: 1px solid var(--line2); border-radius: 7px; padding: 6px 9px;
    background: #fff; outline: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--ink); }
  ::placeholder { color: var(--faint); }

  /* ---- nav rail ---- */
  #rail { width: 185px; background: var(--panel); border-right: 1px solid var(--line);
          display: flex; flex-direction: column; padding: 14px 10px; gap: 4px; }
  #brand { display: flex; align-items: center; gap: 8px; padding: 0 6px 12px; }
  #brand .logo { width: 26px; height: 26px; border-radius: 7px; background: var(--ink);
                 color: #fff; display: grid; place-items: center; font-weight: 800; }
  #brand b { font-size: 14px; } #brand small { display: block; color: var(--dim); font-size: 10px;
             text-transform: uppercase; letter-spacing: .06em; }
  #newReq { margin: 0 2px 12px; padding: 8px; border: 1px solid var(--line2); border-radius: 8px;
            background: #fff; color: var(--fg); font-weight: 600; }
  #newReq:hover { border-color: var(--ink); color: var(--ink); }
  .navItem { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 8px;
             color: var(--dim); border: 0; background: none; text-align: left; width: 100%; font-weight: 500; }
  .navItem svg { width: 15px; height: 15px; flex: none; }
  .navItem:hover { background: var(--ink-soft); color: var(--ink); }
  .navItem.on { background: var(--ink-soft); color: var(--ink); font-weight: 700; }
  .navItem .tag { margin-left: auto; font-size: 9px; color: var(--faint); border: 1px solid var(--line2);
                  padding: 0 5px; border-radius: 99px; }
  #railSpace { flex: 1; }

  /* ---- side panel ---- */
  #side { width: 248px; background: var(--panel); border-right: 1px solid var(--line);
          display: flex; flex-direction: column; min-height: 0; }
  #sideHead { padding: 14px 14px 8px; display: flex; align-items: center; }
  #sideHead h2 { margin: 0; font-size: 11px; letter-spacing: .1em; color: var(--dim); font-weight: 700; }
  #sideHead button { margin-left: auto; border: 0; background: none; color: var(--dim); font-size: 16px; }
  #sideHead button:hover { color: var(--ink); }
  #sideList { flex: 1; overflow: auto; padding: 2px 8px 12px; }
  .colRow { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 7px;
            cursor: pointer; font-weight: 600; }
  .colRow:hover { background: var(--ink-soft); }
  .colRow.drag-over { background: #e9ecff; color: var(--ink); outline: 1px dashed var(--ink); }
  .colRow .car { color: var(--faint); font-size: 10px; width: 10px; }
  .colRow .runBtn { margin-left: auto; border: 0; background: none; color: var(--faint); font-size: 12px; }
  .colRow .runBtn:hover { color: var(--ink); }
  .reqRow { display: flex; align-items: center; gap: 7px; padding: 5px 8px 5px 24px; border-radius: 7px;
            cursor: pointer; color: var(--fg); }
  .reqRow:hover { background: var(--ink-soft); }
  .reqRow.on { background: var(--ink-soft); outline: 1px dashed var(--ink); }
  .reqRow .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .folderRow { display: flex; align-items: center; gap: 6px; padding: 5px 8px 5px 18px; color: var(--dim);
               font-weight: 600; transition: background .15s; }
  .folderRow.drag-over { background: var(--hover); color: var(--fg); }
  .method { font-family: var(--mono); font-size: 9.5px; font-weight: 700; letter-spacing: .03em; }
  .m-GET { color: var(--green); } .m-POST { color: var(--amber); } .m-PUT { color: var(--blue); }
  .m-PATCH { color: var(--purple); } .m-DELETE { color: var(--red); }
  .m-HEAD, .m-OPTIONS { color: var(--dim); }
  .histRow, .presetRow, .envRow { padding: 8px 10px; border-radius: 7px; cursor: pointer; }
  .histRow:hover, .presetRow:hover, .envRow:hover { background: var(--ink-soft); }
  .presetRow.on, .envRow.on { background: var(--ink-soft); }
  .presetRow b { display: block; }
  .presetRow small, .histRow small, .envRow small { color: var(--dim); }

  /* ---- main ---- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar { height: 50px; display: flex; align-items: center; gap: 10px; padding: 0 18px;
            background: var(--panel); border-bottom: 1px solid var(--line); }
  #crumb { color: var(--dim); font-weight: 600; }
  #crumb b { color: var(--fg); }
  #topbar .grow { flex: 1; }
  .btn { border: 1px solid var(--line2); background: #fff; border-radius: 8px; padding: 7px 14px;
         font-weight: 600; color: var(--fg); }
  .btn:hover { border-color: var(--ink); color: var(--ink); }
  .btn.dark { background: var(--ink); border-color: var(--ink); color: #fff; }
  .btn.dark:hover { background: var(--ink-hover); }
  .btn.danger { background: var(--red); border-color: var(--red); color: #fff; }
  .btn.danger:hover { background: #b83030; border-color: #b83030; }
  .btn:disabled { opacity: .5; pointer-events: none; }
  #content { flex: 1; display: flex; min-height: 0; }
  #work { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 16px 18px; gap: 14px;
          overflow: auto; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
          min-width: 0; max-width: 100%; overflow: hidden; }

  /* request editor */
  #urlRow { display: flex; gap: 8px; padding: 12px; align-items: center; }
  #method { font-family: var(--mono); font-weight: 700; width: 96px; }
  #url { flex: 1; font-family: var(--mono); font-size: 13px; }
  #url.var-active, textarea.body.var-active {
    border-color: #e1b244;
    background: #fff9e9;
  }
  table.kv input.var-active, table.formData input.var-active {
    background: #fff9e9;
    border-radius: 4px;
  }
  .varChips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 2px; }
  .varChip {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid #eed08b; background: #fff7e1; color: #7b5a12;
    border-radius: 99px; padding: 2px 10px; font-family: var(--mono); font-size: 11px; font-weight: 700;
  }
  .varChip.missing { border-color: #f0b1b1; background: #fdeeee; color: #a33434; }
  .varChip.secret { border-color: #cdbaf2; background: #f3eefe; color: #5b3ea1; }
  .varScope { font-size: 10px; opacity: .75; font-family: "Inter", system-ui, sans-serif; }
  #reqName { border: 0; font-weight: 700; font-size: 14px; width: 100%; padding: 0 0 2px; }
  #reqName:focus { outline: none; border-bottom: 1px dashed var(--ink); }
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); padding: 0 12px; }
  .tabs button { border: 0; background: none; padding: 9px 12px; color: var(--dim); font-weight: 600;
                 border-bottom: 2px solid transparent; }
  .tabs button.on { color: var(--fg); border-bottom-color: var(--ink); }
  .tabs button .n { background: var(--ink-soft); color: var(--ink); border-radius: 99px; font-size: 10px;
                    padding: 0 6px; margin-left: 4px; }
  .tabBody { padding: 12px; min-width: 0; max-width: 100%; overflow: hidden; }
  table.kv { width: 100%; border-collapse: collapse; }
  table.kv th { text-align: left; font-size: 10px; letter-spacing: .08em; color: var(--dim);
                text-transform: uppercase; padding: 4px 8px; border-bottom: 1px solid var(--line); }
  table.kv td { padding: 4px 6px; border-bottom: 1px solid var(--line); }
  table.kv input[type=text], table.kv input[type=password] { width: 100%; border: 0; background: none;
                font-family: var(--mono); font-size: 12.5px; padding: 4px 2px; }
  table.kv tr.inherited td { color: var(--dim); }
  .origin { font-size: 9px; color: var(--faint); border: 1px solid var(--line2); border-radius: 99px;
            padding: 0 6px; white-space: nowrap; }
  .delRow { border: 0; background: none; color: var(--faint); }
  .delRow:hover { color: var(--red); }
  .addRow { margin-top: 8px; border: 1px dashed var(--line2); background: none; color: var(--dim);
            width: 100%; padding: 7px; border-radius: 7px; }
  .addRow:hover { color: var(--ink); border-color: var(--ink); }
  textarea.body { display: block; width: 100%; max-width: 100%; min-height: 220px;
                  font-family: var(--mono); font-size: 12.5px; resize: vertical;
                  line-height: 1.6; white-space: pre; overflow: auto; }
  .bodyToolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .bodyToolbar label { color: var(--dim); font-weight: 700; }
  .bodyToolbar select { width: 150px; flex: none; }
  .formDataWrap { border: 1px solid var(--line); border-radius: 8px; overflow: auto; max-height: 280px; }
  table.formData { width: 100%; min-width: 720px; border-collapse: collapse; }
  table.formData th { position: sticky; top: 0; z-index: 1; text-align: left; font-size: 10px;
                      letter-spacing: .08em; color: var(--dim); text-transform: uppercase;
                      padding: 7px 8px; border-bottom: 1px solid var(--line); background: #fafbfe; }
  table.formData td { padding: 5px 6px; border-bottom: 1px solid var(--line); background: #fff; }
  table.formData tr:last-child td { border-bottom: 0; }
  table.formData input[type=text], table.formData select { width: 100%; border: 0; background: none;
                      font-family: var(--mono); font-size: 12.5px; padding: 4px 2px; }
  table.formData input[type=checkbox] { margin: 0; }
  .formRow { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  .formRow label { width: 110px; color: var(--dim); font-weight: 600; }
  .formRow input, .formRow select { flex: 1; max-width: 420px; }

  /* response */
  #respMeta { display: flex; gap: 16px; align-items: baseline; padding: 10px 14px;
              border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 12.5px; }
  #respMeta .lbl { font-size: 10px; letter-spacing: .1em; color: var(--dim); font-weight: 700; }
  .pill { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; }
  .pill .dot { width: 7px; height: 7px; border-radius: 99px; background: var(--green); }
  .pill.bad .dot { background: var(--red); }
  .pill.bad { color: var(--red); } .pill.ok { color: var(--green); }
  #respBody { margin: 0; padding: 12px 14px; font-family: var(--mono); font-size: 12.5px;
              white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow: auto; }
  .hdrWrap { max-height: 340px; overflow: auto; }
  #respCard { display: flex; flex-direction: column; min-width: 0; }
  #respCard.hasResp { min-height: 260px; }
  #respCard.hasResp #respBody,
  #respCard.hasResp .hdrWrap,
  #respCard.hasResp #timingBars {
    max-height: min(58vh, 700px);
    overflow: auto;
  }
  .hdrTitle { display: flex; align-items: center; gap: 8px; padding: 10px 14px 4px; font-size: 10px;
              letter-spacing: .08em; color: var(--dim); font-weight: 700; text-transform: uppercase; }
  .hdrTitle .n { background: var(--ink-soft); color: var(--ink); border-radius: 99px; padding: 0 7px;
                 font-size: 10px; letter-spacing: 0; }
  table.hdr { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
  table.hdr td { padding: 6px 14px; border-bottom: 1px solid var(--line); vertical-align: top; }
  table.hdr tr:last-child td { border-bottom: 0; }
  table.hdr td.k { color: var(--ink); font-weight: 600; width: 28%; white-space: nowrap; }
  table.hdr td.v { word-break: break-all; color: var(--fg); }
  table.hdr td.o { width: 90px; text-align: right; }
  table.hdr tr:hover td { background: #fafbfe; }
  .iconBtn { border: 1px solid var(--line2); background: #fff; border-radius: 7px; padding: 3px 10px;
             color: var(--dim); font-size: 11.5px; font-weight: 600; font-family: "Inter", system-ui, sans-serif; }
  .iconBtn:hover { color: var(--ink); border-color: var(--ink); }
  #respMeta .actions { margin-left: auto; display: flex; gap: 6px; }
  .json-k { color: var(--ink); } .json-s { color: #0d7a52; } .json-n { color: #b45309; }

  /* script editor */
  .scriptWrap { position: relative; border: 1px solid var(--line2); border-radius: 8px; overflow: hidden;
                min-width: 0; max-width: 100%; }
  .scriptSubTabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line2); padding: 0 10px; background: #fafbfe; }
  .scriptSubTabs button { border: 0; background: none; padding: 7px 12px; color: var(--dim); font-size: 12px;
                           font-weight: 600; border-bottom: 2px solid transparent; }
  .scriptSubTabs button.on { color: var(--fg); border-bottom-color: var(--ink); }
  .scriptEditor { position: relative; font-family: var(--mono); font-size: 12.5px; height: 240px;
                  min-height: 160px; max-width: 100%; resize: vertical; overflow: hidden; }
  .scriptEditor textarea {
    position: absolute; inset: 0; display: block; width: 100%; max-width: 100%; height: 100%; min-height: 200px;
    border: 0; padding: 12px 12px 12px 52px; font: inherit; resize: none;
    background: transparent; color: transparent; caret-color: var(--fg);
    outline: none; z-index: 2; white-space: pre; overflow-wrap: normal; overflow: auto;
    line-height: 1.6;
  }
  .scriptHighlight {
    position: absolute; inset: 0; padding: 12px 12px 12px 52px;
    font: inherit; pointer-events: none; white-space: pre; overflow: hidden;
    line-height: 1.6; color: var(--fg); z-index: 1; background: #f8f9fe;
  }
  .json-k { color: #d73a49; font-weight: 600; }
  .json-s { color: #032f62; }
  .json-n { color: #005cc5; }
  .json-b { color: #d73a49; }
  .json-null { color: #d73a49; }
  .var-token { background: #ffe9b5; color: #7c4f00; border-radius: 3px; padding: 0 1px; }
  .scriptLineNums {
    position: absolute; left: 0; top: 0; width: 44px; padding: 12px 8px;
    text-align: right; font: inherit; color: var(--faint); line-height: 1.6;
    pointer-events: none; user-select: none; background: #f0f1f8;
    border-right: 1px solid var(--line2); z-index: 3;
    white-space: pre;
  }
  .bodyEditor { height: 320px; min-height: 240px; }
  .scriptErr { background: #fdf3f3; border: 1px solid #f3d4d4; border-radius: 7px;
               padding: 6px 12px; font-family: var(--mono); font-size: 12px; color: var(--red);
               margin-top: 8px; }
  .scriptSnippets { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 0; }
  .scriptSnippets button { font-size: 11px; padding: 3px 10px; border: 1px solid var(--line2);
                            border-radius: 99px; background: #fff; color: var(--dim); font-weight: 600; }
  .scriptSnippets button:hover { color: var(--ink); border-color: var(--ink); }
  /* JS syntax tokens */
  .js-kw { color: #7c3aed; font-weight: 600; }
  .js-fn { color: #1d4ed8; }
  .js-pm { color: #0369a1; font-weight: 600; }
  .js-str { color: #0d7a52; }
  .js-num { color: #b45309; }
  .js-cmt { color: var(--faint); font-style: italic; }
  #assertChips { padding: 8px 14px 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { font-size: 11px; border-radius: 99px; padding: 2px 10px; font-weight: 600; }
  .chip.ok { background: #e7f7f0; color: var(--green); }
  .chip.bad { background: #fdecec; color: var(--red); }
  #timingBars { padding: 10px 14px; font-family: var(--mono); font-size: 11.5px; color: var(--dim); }
  #timingBars b { color: var(--fg); }
  .bar { display: inline-block; height: 7px; background: var(--ink); border-radius: 2px;
         vertical-align: middle; margin: 0 10px 0 4px; }

  /* meta side panel */
  #meta { width: 230px; border-left: 1px solid var(--line); background: var(--panel); padding: 16px 14px;
          overflow: auto; }
  #meta h3 { margin: 0 0 10px; font-size: 13px; }
  .metaCard { border: 1px solid var(--line); border-radius: 8px; padding: 10px; margin-bottom: 12px; }
  .metaCard .lbl { font-size: 9.5px; letter-spacing: .1em; color: var(--dim); font-weight: 700;
                   text-transform: uppercase; display: block; margin-bottom: 6px; }
  .metric { display: inline-block; margin-right: 14px; }
  .metric b { display: block; font-size: 15px; color: var(--ink); }
  .metric span { font-size: 10px; color: var(--dim); }

  /* runner view */
  .sumRow { display: flex; gap: 12px; }
  .sumCard { flex: 1; border-left: 3px solid var(--line2); padding: 10px 14px; }
  .sumCard .lbl { font-size: 9.5px; letter-spacing: .1em; color: var(--dim); font-weight: 700;
                  text-transform: uppercase; }
  .sumCard b { font-size: 20px; font-family: var(--mono); }
  .sumCard.green { border-left-color: var(--green); } .sumCard.red { border-left-color: var(--red); }
  .runRow { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            border-bottom: 1px solid var(--line); }
  .runRow .ic { font-weight: 800; }
  .runRow .ic.ok { color: var(--green); } .runRow .ic.bad { color: var(--red); }
  .runErr { font-family: var(--mono); font-size: 12px; color: var(--red); background: #fdf3f3;
            border: 1px solid #f3d4d4; border-radius: 7px; padding: 8px 12px; margin: 0 14px 10px 38px; }
  .xrayCard { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #f1f2f9;
              border-radius: 0 0 var(--radius) var(--radius); color: var(--dim); }
  .badge { font-size: 10px; font-weight: 800; letter-spacing: .05em; border-radius: 4px; padding: 2px 8px; }
  .badge.fail { background: #fdecec; color: var(--red); border: 1px solid #f3c8c8; }
  .badge.pass { background: #e7f7f0; color: var(--green); border: 1px solid #c4ebd9; }

  /* footer */
  #statusbar { height: 24px; background: var(--panel); border-top: 1px solid var(--line);
               display: flex; align-items: center; gap: 18px; padding: 0 14px; font-family: var(--mono);
               font-size: 10.5px; color: var(--dim); }
  #statusbar .dot { width: 6px; height: 6px; border-radius: 99px; background: var(--green);
                    display: inline-block; margin-right: 5px; }
  #toast { position: fixed; bottom: 38px; right: 16px; background: var(--ink); color: #fff;
           border-radius: 8px; padding: 9px 14px; font-weight: 600; display: none; max-width: 420px; }
  #toast.err { background: var(--red); }
  .secLock { color: var(--faint); cursor: pointer; }
  .secLock.on { color: var(--ink); }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chips .att { border: 1px solid var(--line2); border-radius: 99px; padding: 3px 12px; font-weight: 600;
                background: #fff; }
  .chips .att.on { background: var(--ink-soft); border-color: var(--ink); color: var(--ink); }
  .note { background: #f1f2f9; border-radius: 7px; padding: 9px 12px; color: var(--dim); font-style: italic; }
  .empty { color: var(--dim); padding: 40px; text-align: center; }

  /* ---- context menu ---- */
  #ctxMenu { position: fixed; z-index: 9999; background: var(--panel); border: 1px solid var(--line2);
             border-radius: 10px; padding: 4px; min-width: 180px; display: none;
             box-shadow: 0 8px 24px rgba(0,0,0,.12), 0 2px 6px rgba(0,0,0,.08); }
  #ctxMenu.open { display: block; }
  .ctxItem { display: flex; align-items: center; gap: 9px; padding: 7px 12px; border-radius: 7px;
             cursor: pointer; font-size: 13px; color: var(--fg); border: 0; background: none;
             width: 100%; text-align: left; white-space: nowrap; }
  .ctxItem:hover { background: var(--ink-soft); color: var(--ink); }
  .ctxItem.danger:hover { background: #fdecec; color: var(--red); }
  .ctxItem .ctxIco { width: 16px; text-align: center; flex: none; }
  .ctxSep { height: 1px; background: var(--line); margin: 4px 0; }

  /* ---- modal dialogs ---- */
  .modal-overlay { position: fixed; inset: 0; background: rgba(28,31,51,.5); z-index: 8000;
                   display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--panel); border: 1px solid var(--line2); border-radius: var(--radius);
               padding: 24px; min-width: 340px; max-width: 460px; width: calc(100% - 32px);
               box-shadow: 0 16px 48px rgba(0,0,0,.18); }
  .modal-title { font-weight: 700; font-size: 15px; margin: 0 0 12px; }
  .modal-msg { color: var(--fg); margin: 0 0 20px; line-height: 1.5; }
  #modalInput { width: 100%; margin-bottom: 18px; }
  #modalInputArea { width: 100%; min-height: 220px; margin-bottom: 18px; resize: vertical; font-family: var(--mono); }
  .modal-choices { display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px; }
  .modal-choice { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border: 1px solid var(--line2);
                  border-radius: 8px; cursor: pointer; background: #fff; text-align: left; width: 100%; font-size: 13px; }
  .modal-choice:hover { border-color: var(--ink); background: var(--ink-soft); color: var(--ink); }
  .modal-choice.on { border-color: var(--ink); background: var(--ink-soft); color: var(--ink); font-weight: 600; }
  .modal-hint { margin-left: auto; font-size: 11px; color: var(--faint); font-weight: 400; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; }
</style>
</head>
<body>
<div id="app">
  <nav id="rail">
    <div id="brand"><div class="logo">R</div><div><b>Relay</b><small>API Workbench</small></div></div>
    <button id="newReq">New Request</button>
    <button class="navItem on" data-view="collections">▦ Collections</button>
    <button class="navItem" data-view="history">⟲ History</button>
    <button class="navItem" data-view="environments">⛁ Environments</button>
    <button class="navItem" data-view="presets">☰ Header Presets</button>
    <button class="navItem" data-view="tests">☑ Test Management</button>
    <button class="navItem" disabled>▣ Mock Servers <span class="tag">v2</span></button>
    <button class="navItem" disabled>◉ Monitor <span class="tag">v2</span></button>
    <div id="railSpace"></div>
    <button class="navItem" data-view="settings">⚙ Settings</button>
  </nav>
  <aside id="side">
    <div id="sideHead"><h2 id="sideTitle">COLLECTIONS</h2><button id="sideAdd" title="add">+</button></div>
    <div id="sideList"></div>
  </aside>
  <div id="main">
    <div id="topbar">
      <span id="crumb">Workspace</span>
      <span class="grow"></span>
      <select id="envSel"><option value="">No environment</option></select>
      <button class="btn" id="importBtn">Import</button>
      <button class="btn" id="exportBtn">Export ▾</button>
    </div>
    <div id="content">
      <div id="work"><div class="empty">Select a request, or create one.</div></div>
      <div id="meta" hidden></div>
    </div>
  </div>
</div>
<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <p id="modalTitle" class="modal-title" hidden></p>
    <p id="modalMsg" class="modal-msg" hidden></p>
    <input id="modalInput" type="text" hidden>
    <textarea id="modalInputArea" hidden></textarea>
    <div id="modalChoices" class="modal-choices" hidden></div>
    <div class="modal-actions">
      <button id="modalCancel" class="btn">Cancel</button>
      <button id="modalOk" class="btn dark">OK</button>
    </div>
  </div>
</div>
<div id="ctxMenu"></div>
<div id="statusbar"><span><span class="dot"></span>AGENT ONLINE</span><span>relay 0.2.0</span><span id="dbinfo">sqlite</span></div>
<div id="toast"></div>
<input type="file" id="importFile" accept=".json" hidden>

<script>
'use strict';
const $ = (id) => document.getElementById(id);
const h = (tag, attrs = {}, ...kids) => {

  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else if (k === 'value') el.value = v;
    else if (k === 'checked') el.checked = !!v;
    else if (v !== undefined && v !== null) el.setAttribute(k, v);
  }
  for (const k of kids.flat()) el.append(k);
  return el;
};
const esc = (s) => String(s ?? '');
const METHODS = ['GET','POST','PUT','PATCH','DELETE','HEAD','OPTIONS'];

/* ---------- context menu ---------- */
const ctxMenu = {
  el: null,
  init() { this.el = $('ctxMenu'); document.addEventListener('click', () => this.close()); document.addEventListener('keydown', e => { if (e.key === 'Escape') this.close(); }); },
  close() { this.el.classList.remove('open'); this.el.innerHTML = ''; },
  show(x, y, items) {
    this.el.innerHTML = '';
    for (const item of items) {
      if (item === '-') { this.el.append(h('div', { class: 'ctxSep' })); continue; }
      const btn = h('button', { class: 'ctxItem' + (item.danger ? ' danger' : ''), onclick: () => { this.close(); item.action(); } },
        h('span', { class: 'ctxIco' }, item.icon || ''),
        item.label);
      this.el.append(btn);
    }
    // Position: keep menu within viewport.
    this.el.style.left = '0'; this.el.style.top = '0';
    this.el.classList.add('open');
    const rect = this.el.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    this.el.style.left = Math.min(x, vw - rect.width - 6) + 'px';
    this.el.style.top  = Math.min(y, vh - rect.height - 6) + 'px';
  },
};

/* ---------- modal dialogs ---------- */
const modal = {
  _res: null, _mode: 'confirm', _multiline: false,
  init() {
    $('modalCancel').onclick = () => this._done(null);
    $('modalOk').onclick = () => this._submit();
    $('modal').addEventListener('click', e => { if (e.target === $('modal')) this._done(null); });
    document.addEventListener('keydown', e => {
      if (!$('modal').classList.contains('open')) return;
      if (e.key === 'Escape') { e.preventDefault(); this._done(null); }
    });
    $('modalInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); this._submit(); } });
    $('modalInputArea').addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        this._submit();
      }
    });
  },
  _done(val) { $('modal').classList.remove('open'); if (this._res) { this._res(val); this._res = null; } },
  _submit() {
    if (this._mode === 'prompt') {
      const src = this._multiline ? $('modalInputArea') : $('modalInput');
      const v = src.value.trim(); this._done(v || null);
    } else if (this._mode === 'pick') {
      const s = $('modalChoices').querySelector('.modal-choice.on'); this._done(s ? s.dataset.value : null);
    } else {
      this._done(true);
    }
  },
  _base() {
    $('modalTitle').hidden = true; $('modalMsg').hidden = true;
    $('modalInput').hidden = true; $('modalInput').value = '';
    $('modalInputArea').hidden = true; $('modalInputArea').value = '';
    this._multiline = false;
    $('modalChoices').hidden = true; $('modalChoices').innerHTML = '';
    $('modal').classList.add('open');
  },
  confirm(msg, { danger = false, ok = 'Confirm' } = {}) {
    return new Promise(res => {
      this._res = res; this._mode = 'confirm'; this._base();
      $('modalMsg').textContent = msg; $('modalMsg').hidden = false;
      const btn = $('modalOk'); btn.textContent = ok; btn.className = 'btn ' + (danger ? 'danger' : 'dark');
    });
  },
  prompt(label, { placeholder = '', value = '', ok = 'OK', multiline = false } = {}) {
    return new Promise(res => {
      this._res = res; this._mode = 'prompt'; this._base();
      $('modalTitle').textContent = label; $('modalTitle').hidden = false;
      this._multiline = multiline;
      const inp = multiline ? $('modalInputArea') : $('modalInput');
      inp.hidden = false; inp.placeholder = placeholder; inp.value = value;
      $('modalOk').textContent = ok; $('modalOk').className = 'btn dark';
      setTimeout(() => { inp.focus(); if (value) inp.select(); }, 30);
    });
  },
  pick(title, options) {
    return new Promise(res => {
      this._res = res; this._mode = 'pick'; this._base();
      $('modalTitle').textContent = title; $('modalTitle').hidden = false;
      const wrap = $('modalChoices'); wrap.hidden = false;
      options.forEach((opt, i) => {
        const btn = h('button', {
          class: 'modal-choice' + (i === 0 ? ' on' : ''), 'data-value': opt.value,
          onclick: e => { wrap.querySelectorAll('.modal-choice').forEach(b => b.classList.remove('on')); e.currentTarget.classList.add('on'); },
          ondblclick: () => this._submit(),
        }, opt.label, ...(opt.hint ? [h('span', { class: 'modal-hint' }, opt.hint)] : []));
        wrap.append(btn);
      });
      $('modalOk').textContent = 'Select'; $('modalOk').className = 'btn dark';
    });
  },
};

const S = {
  view: 'collections', state: { collections: [], environments: [], presets: [] },
  openCols: new Set(), reqId: null, req: null, tab: 'headers',
  last: null, run: null, presetId: null, envName: localStorage.envName || '',
  history: [], reqDirty: false,
};

function setReqDirty(v) {
  S.reqDirty = !!v;
  const b = $('saveReqBtn');
  if (!b) return;
  b.textContent = S.reqDirty ? 'Save *' : 'Save';
  b.classList.toggle('dark', S.reqDirty);
}

async function api(url, opts = {}) {
  if (opts.body && typeof opts.body !== 'string') {
    opts.body = JSON.stringify(opts.body);
    opts.headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  }
  const r = await fetch(url, opts);
  const ct = r.headers.get('Content-Type') || '';
  const data = ct.includes('json') ? await r.json() : await r.text();
  if (!r.ok) throw new Error((data && data.error) || r.statusText);
  return data;
}
let toastTimer;
function toast(msg, err) {
  const t = $('toast');
  t.textContent = msg; t.className = err ? 'err' : ''; t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display = 'none', err ? 5000 : 2200);
}

async function refresh() {
  S.state = await api('/api/state');
  renderEnvSel(); renderSide();
}
function findReqMeta(id) {
  for (const c of S.state.collections)
    for (const q of c.requests) if (q.id === id) return { col: c, meta: q };
  return null;
}

const VAR_RE = /\{\{\s*([^{}\s][^{}]*)\s*\}\}/g;

function extractVariables(text) {
  if (!text) return [];
  const seen = new Set();
  const vars = [];
  for (const m of String(text).matchAll(VAR_RE)) {
    const raw = (m[1] || '').trim();
    if (!raw || seen.has(raw)) continue;
    seen.add(raw);
    vars.push(raw);
  }
  return vars;
}

function collectScopeVars() {
  const names = new Set();
  const req = S.req?.spec;
  const meta = S.reqId ? findReqMeta(S.reqId) : null;
  const col = meta?.col;
  const folder = col?.folders?.find(f => String(f.id) === String(S.req?.folderId));
  const env = (S.state.environments || []).find(e => e.name === S.envName);
  Object.keys(req?.vars || {}).forEach(k => names.add(k));
  Object.keys(folder?.vars || {}).forEach(k => names.add(k));
  Object.keys(col?.vars || {}).forEach(k => names.add(k));
  Object.keys(env?.vars || {}).forEach(k => names.add(k));
  (env?.secrets || []).forEach(k => names.add(k));
  return names;
}

function sourceForVar(name) {
  const req = S.req?.spec;
  const meta = S.reqId ? findReqMeta(S.reqId) : null;
  const col = meta?.col;
  const folder = col?.folders?.find(f => String(f.id) === String(S.req?.folderId));
  const env = (S.state.environments || []).find(e => e.name === S.envName);
  if (Object.prototype.hasOwnProperty.call(req?.vars || {}, name)) return 'request';
  if (Object.prototype.hasOwnProperty.call(folder?.vars || {}, name)) return 'folder';
  if (Object.prototype.hasOwnProperty.call(col?.vars || {}, name)) return 'collection';
  if (Object.prototype.hasOwnProperty.call(env?.vars || {}, name)) return 'environment';
  if ((env?.secrets || []).includes(name)) return 'secret';
  if (name.startsWith('$')) return 'computed';
  return 'unresolved';
}

function resolvedValueForVar(name) {
  if (!S.req?.id) return null;
  const r = S.last?.resolved;
  if (!r) return null;
  if (!name.startsWith('$') && Object.prototype.hasOwnProperty.call(r.vars || {}, name)) {
    return r.vars[name];
  }
  const values = [
    ...(Object.entries(r.query || {}).map(([k, v]) => `${k}=${v}`)),
    ...(Object.entries(r.headers || {}).map(([k, v]) => `${k}=${v}`)),
    r.url || '',
    r.body || '',
  ].join('\n');
  const m = values.match(new RegExp(String.raw`\{\{\s*${name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\s*\}\}`));
  if (m) return m[0];
  return null;
}

function renderVarChips(text, { title = 'Variables' } = {}) {
  const names = extractVariables(text);
  if (!names.length) return null;
  const known = collectScopeVars();
  const chips = h('div', { class: 'varChips', 'aria-label': title });
  for (const n of names) {
    const src = sourceForVar(n);
    const val = resolvedValueForVar(n);
    const isMissing = src === 'unresolved';
    const isSecret = src === 'secret';
    const tip = isSecret
      ? `${n}: value hidden (secret)`
      : (val !== null && val !== undefined && val !== '' ? `${n} = ${val}` : `${n}: ${isMissing ? 'unresolved' : src}`);
    chips.append(h('span', {
      class: 'varChip' + (isMissing ? ' missing' : '') + (isSecret ? ' secret' : ''),
      title: tip,
    }, `{{${n}}}`, h('span', { class: 'varScope' }, src)));
  }
  return chips;
}

function decorateVarInput(inputEl) {
  const refresh = () => {
    const hasVars = /\{\{[^{}]+\}\}/.test(inputEl.value || '');
    inputEl.classList.toggle('var-active', hasVars);
    inputEl.title = hasVars ? 'Contains {{variables}}. See chips below for resolved values.' : '';
  };
  inputEl.addEventListener('input', refresh);
  inputEl.addEventListener('change', refresh);
  refresh();
}

async function moveRequestTo(reqId, collectionId, folderId = null) {
  const r = await api('/api/requests/' + reqId);
  r.collectionId = collectionId;
  r.folderId = folderId;
  await api('/api/requests/' + reqId, { method: 'PUT', body: r });
}

/* ---------- nav + side panel ---------- */
document.querySelectorAll('.navItem[data-view]').forEach(b => b.onclick = async () => {
  if (S.reqDirty && S.req) await saveRequest();
  S.view = b.dataset.view;
  document.querySelectorAll('.navItem').forEach(x => x.classList.toggle('on', x === b));
  renderSide();
  if (S.view === 'history') renderHistoryView();
  if (S.view === 'environments') renderEnvView();
  if (S.view === 'presets') renderPresetView();
  if (S.view === 'settings') renderSettingsView();
  if (S.view === 'tests') renderTestsView();
  if (S.view === 'collections' && S.reqId) openRequest(S.reqId);
});

function renderSide() {
  const list = $('sideList'); list.innerHTML = '';
  const titles = { collections: 'COLLECTIONS', history: 'HISTORY', environments: 'ENVIRONMENTS', presets: 'HEADER PRESETS', settings: 'SETTINGS', tests: 'TEST MANAGEMENT' };
  $('sideTitle').textContent = titles[S.view];
  $('sideAdd').style.visibility = (S.view === 'history' || S.view === 'settings' || S.view === 'tests') ? 'hidden' : 'visible';

  if (S.view === 'collections') {
    for (const c of S.state.collections || []) {
      const open = S.openCols.has(c.id);
      list.append(h('div', { class: 'colRow',
        onclick: () => { open ? S.openCols.delete(c.id) : S.openCols.add(c.id); renderSide(); },
        ondragover: (e) => {
          e.preventDefault();
          e.currentTarget.classList.add('drag-over');
          if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
        },
        ondragleave: (e) => { e.currentTarget.classList.remove('drag-over'); },
        ondrop: async (e) => {
          e.preventDefault();
          e.currentTarget.classList.remove('drag-over');
          const reqId = e.dataTransfer.getData('requestId');
          if (!reqId) return;
          try {
            await moveRequestTo(reqId, c.id, null);
            await refresh();
            renderSide();
            toast('Request moved to collection');
          } catch (err) { toast(err.message, true); }
        },
        oncontextmenu: (e) => { e.preventDefault(); e.stopPropagation(); showColCtx(e, c); },
      },

        h('span', { class: 'car' }, open ? '▾' : '▸'), '🗀 ', c.name,
        h('button', { class: 'runBtn', title: 'Run collection', onclick: (e) => { e.stopPropagation(); runCollection(c); } }, '▶'),
        h('button', { class: 'runBtn', title: 'Collection settings', onclick: (e) => { e.stopPropagation(); renderCollectionSettings(c); } }, '⚙'),
        h('button', { class: 'runBtn', title: 'Delete collection', onclick: async (e) => {
          e.stopPropagation();
          if (!await modal.confirm(`Delete "${c.name}" and all its requests?`, { danger: true, ok: 'Delete' })) return;
          try {
            await api('/api/collections/' + c.id, { method: 'DELETE' });
            if (S.reqId && findReqMeta(S.reqId)?.col.id === c.id) { S.reqId = null; S.req = null; $('work').innerHTML = '<div class="empty">Select a request, or create one.</div>'; $('meta').hidden = true; }
            await refresh();
          } catch (err) { toast(err.message, true); }
        } }, '✕')));

      if (!open) continue;
      const byFolder = (fid) => c.requests.filter(q => String(q.folderId) === String(fid));
      for (const q of byFolder(null)) list.append(reqRow(q));
      for (const f of c.folders) {
        list.append(h('div', {
          class: 'folderRow',
          ondragover: (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); },
          ondragleave: (e) => { e.currentTarget.classList.remove('drag-over'); },
          ondrop: async (e) => {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const reqId = e.dataTransfer.getData('requestId');
            if (reqId) {
              try {
                const r = await api('/api/requests/' + reqId);
                r.folderId = f.id;
                await api('/api/requests/' + reqId, { method: 'PUT', body: r });
                await refresh();
                renderSide();
                toast('Request moved to folder');
              } catch (err) { toast(err.message, true); }
            }
          },
          oncontextmenu: (e) => { e.preventDefault(); e.stopPropagation(); showFolderCtx(e, f, c); }
        }, '🗀 ', f.name,
          h('button', { class: 'runBtn', title: 'Folder settings', style: 'margin-left:auto',
            onclick: (e) => { e.stopPropagation(); renderFolderSettings(f, c); } }, '⚙')));
        const folderReqs = byFolder(f.id);
        if (!folderReqs.length) {
          list.append(h('div', {
            class: 'reqRow',
            style: 'opacity:.65;font-style:italic',
            oncontextmenu: (e) => { e.preventDefault(); e.stopPropagation(); showFolderCtx(e, f, c); },
          }, h('span', { class: 'nm' }, '(empty folder)')));
        }
        for (const q of folderReqs) list.append(reqRow(q));
      }
    }
  } else if (S.view === 'history') {
    for (const e of S.history) {
      list.append(h('div', {
        class: 'histRow',
        onclick: () => showHistory(e.id),
        oncontextmenu: (ev) => { ev.preventDefault(); ev.stopPropagation(); showHistCtx(ev, e); },
      },
        h('span', { class: 'method m-' + e.method }, e.method + ' '),
        esc(e.requestName),
        h('small', {}, ` — ${e.status} · ${e.durationMs.toFixed(0)}ms`)));
    }
    if (!S.history.length) list.append(h('div', { class: 'histRow' }, h('small', {}, 'No sends yet')));
  } else if (S.view === 'environments') {
    for (const e of S.state.environments || [])
      list.append(h('div', { class: 'envRow' + (S.envEdit === e.name ? ' on' : ''), onclick: () => renderEnvView(e.name) },
        '⛁ ', e.name, h('small', {}, ` · ${Object.keys(e.vars || {}).length} vars`)));
  } else if (S.view === 'presets') {
    for (const p of S.state.presets || []) {
      const atts = (p.attachments || []).length;
      list.append(h('div', { class: 'presetRow' + (S.presetId === p.id ? ' on' : ''), onclick: () => renderPresetView(p.id) },
        h('b', {}, '⛉ ' + p.name),
        h('small', {}, `${(p.headers || []).length} headers · ${atts} attached`)));
    }
  } else if (S.view === 'tests') {
    renderTestsSide(list);
  }
}

/* ---------- test management ---------- */
function allTests() {
  const out = [];
  for (const c of S.state.collections || [])
    for (const q of c.requests) out.push({ col: c, meta: q });
  return out;
}
function testFailedLastRun(reqId) {
  const e = (S.history || []).find(x => x.requestId === reqId);
  return e ? !(e.status >= 200 && e.status < 400) : false;
}
function filteredTests() {
  const q = (S.testSearch || '').toLowerCase();
  return allTests().filter(({ col, meta }) => {
    if (q && !(meta.name.toLowerCase().includes(q) || meta.url.toLowerCase().includes(q))) return false;
    const full = S.testFull && S.testFull[meta.id];
    for (const chip of S.testChips || []) {
      if (chip === 'failed' && !testFailedLastRun(meta.id)) return false;
      if (chip === 'noxray' && full && full.spec.xrayKey) return false;
      if (chip === 'hasassert' && !(full && (full.spec.assertions || []).length)) return false;
      if (chip === 'tagged' && !(full && (full.spec.tags || []).length)) return false;
    }
    return true;
  });
}
function renderTestsSide(list) {
  list.append(h('div', { style: 'padding:0 8px 8px' },
    h('input', { type: 'text', placeholder: 'Search tests…', style: 'width:100%', value: S.testSearch || '',
      oninput: (e) => { S.testSearch = e.target.value; renderSide(); } })));
  const chipDefs = [['failed', 'Failed last run'], ['noxray', 'No Xray link'], ['hasassert', 'Has assertions'], ['tagged', 'Tagged']];
  const chips = h('div', { class: 'chips', style: 'padding:0 8px 10px' });
  S.testChips = S.testChips || [];
  for (const [key, label] of chipDefs) {
    const on = S.testChips.includes(key);
    chips.append(h('button', { class: 'att' + (on ? ' on' : ''), style: 'font-size:11px;padding:2px 9px', onclick: () => {
      S.testChips = on ? S.testChips.filter(x => x !== key) : [...S.testChips, key];
      renderSide();
    } }, label));
  }
  list.append(chips);
  for (const { col, meta } of filteredTests()) {
    list.append(h('div', { class: 'reqRow' + (meta.id === S.testId ? ' on' : ''), onclick: () => openTest(meta.id) },
      h('span', { class: 'method m-' + meta.method }, meta.method),
      h('span', { class: 'nm' }, meta.name),
      h('small', { style: 'color:var(--faint);margin-left:auto' }, col.name)));
  }
  if (!filteredTests().length) list.append(h('div', { class: 'histRow' }, h('small', {}, 'No tests match')));
}

async function ensureTestFull() {
  S.testFull = S.testFull || {};
  const todo = allTests().filter(({ meta }) => !S.testFull[meta.id]);
  if (!todo.length) return;
  await Promise.all(todo.map(async ({ meta }) => {
    try { S.testFull[meta.id] = await api('/api/requests/' + meta.id); } catch { /* skip */ }
  }));
}

async function renderTestsView() {
  await loadHistory();
  await ensureTestFull();
  renderSide();
  if (S.testId) openTest(S.testId); else {
    $('crumb').innerHTML = ''; $('crumb').append('Workspace / ', h('b', {}, 'Test Management'));
    $('meta').hidden = true;
    $('work').innerHTML = '';
    $('work').append(h('div', { class: 'empty' }, 'Select a test from the list.'));
  }
}

async function openTest(id) {
  S.testId = id;
  try {
    const full = await api('/api/requests/' + id);
    S.testFull = S.testFull || {}; S.testFull[id] = full;
    renderSide();
    renderTestEditor(full);
  } catch (e) { toast(e.message, true); }
}

  // Owner + Priority

    h('div', { class: 'formRow' }, h('label', {}, 'Owner'),

    h('div', { class: 'formRow' }, h('label', {}, 'Priority'),

    h('div', { style: 'display:flex;align-items:center;gap:8px;margin-bottom:8px' },

      h('span', { class: 'n', style: 'background:var(--ink-soft);color:var(--ink);border-radius:99px;font-size:10px;padding:0 6px' }, String(asserts.length))));
  assertCard.append(buildAssertionsEditor(spec, save));

  // Traceability

    h('div', { class: 'lbl', style: 'font-size:10px;letter-spacing:.1em;color:var(--dim);font-weight:700;margin-bottom:8px' }, 'TRACEABILITY'),

  // Last run

    lastCard.append(h('div', { style: 'color:var(--faint)' }, 'No recorded sends for this test yet.'));
  } else if (S.lastTestRun && S.lastTestRun.id === full.id) {

    const ok = r.status >= 200 && r.status < 400;
    lastCard.append(h('div', { style: 'display:flex;gap:14px;align-items:baseline;margin-bottom:8px' },
      h('span', { class: 'pill ' + (ok ? 'ok' : 'bad') }, h('span', { class: 'dot' }), r.status),
      h('span', {}, r.timing.total.toFixed(0) + 'ms'),

    for (const a of r.assertions || []) {

    }

      h('span', { class: 'pill ' + (ok ? 'ok' : 'bad') }, h('span', { class: 'dot' }), lastEntry.status),
      h('span', {}, lastEntry.durationMs.toFixed(0) + 'ms'),
      h('span', { style: 'color:var(--dim)' }, new Date(lastEntry.sentAt).toLocaleString())));
    lastCard.append(h('div', { class: 'note', style: 'margin-top:8px' }, 'Per-assertion results aren\'t stored in history — run the test again to see fresh assertion outcomes here.'));
  }
  work.append(lastCard);

  renderTestMeta(full);
}

function showFolderCtx(e, f, c) {
  ctxMenu.show(e.clientX, e.clientY, [
    { icon: '+', label: 'New request in folder', action: async () => {
      try {
        const created = await api('/api/requests', { method: 'POST',
          body: {
            collectionId: c.id,
            folderId: f.id,

        });

        await refresh();
        openRequest(created.id);
        toast('Request created in folder');
      } catch (err) { toast(err.message, true); }
    }},
    '-',
    { icon: '▶', label: 'Run folder', action: async () => {
      try {
        const reqs = c.requests.filter(q => String(q.folderId) === String(f.id));
        if (!reqs.length) {
          toast('Folder is empty');
          return;
        }
        const result = { passed: 0, failed: 0, duration: 0 };
        for (const q of reqs) {
          try {
            const r = await api('/api/send', { method: 'POST', body: { requestId: q.id, env: S.envName } });
            const assertOk = (r.assertions || []).every(a => a.passed);
            const scriptOk = (r.scriptTests || []).every(t => t.passed);
            if (assertOk && scriptOk) result.passed++; else result.failed++;
            result.duration += r.timing.total;
          } catch { result.failed++; }
        }
        toast(`Folder run: ${result.passed}/${reqs.length} passed`);
      } catch (err) { toast(err.message, true); }
    }},
    { icon: '✎', label: 'Rename folder', action: async () => {
      const name = await modal.prompt('New folder name', { value: f.name }); if (!name) return;
      try {
        f.name = name;
        await api('/api/folders/' + f.id, { method: 'PATCH', body: f });
        await refresh();
        renderSide();
        toast('Folder renamed');
      } catch (err) { toast(err.message, true); }
    }},
    '-',
    { icon: '🗑', label: 'Delete folder', danger: true, action: async () => {
      if (!await modal.confirm(`Delete "${f.name}" folder?`, { danger: true, ok: 'Delete' })) return;
      try {
        await api('/api/folders/' + f.id, { method: 'DELETE' });
        await refresh();
        renderSide();
        toast('Folder deleted');
      } catch (err) { toast(err.message, true); }
    }},
  ]);
}

async function showReqCtx(e, q) {
  const meta = findReqMeta(q.id);
  const allCols = S.state.collections || [];
  ctxMenu.show(e.clientX, e.clientY, [
    { icon: '↗', label: 'Open', action: () => openRequest(q.id) },
    { icon: '⧉', label: 'Duplicate', action: async () => {
      try {
        const src = await api('/api/requests/' + q.id);
        const created = await api('/api/requests', { method: 'POST',
          body: { collectionId: src.collectionId, folderId: src.folderId,
                  spec: { ...src.spec, name: src.spec.name + ' (copy)' } } });
        await refresh(); S.openCols.add(src.collectionId); renderSide(); openRequest(created.id);
        toast('Request duplicated');
      } catch (err) { toast(err.message, true); }
    }},
    { icon: '✎', label: 'Rename', action: async () => {
      const name = await modal.prompt('Rename request', { value: q.name }); if (!name) return;
      if (S.req && S.req.id === q.id) { S.req.spec.name = name; saveRequest(); }
      else api('/api/requests/' + q.id, { method: 'PUT', body: { spec: { ...q, name } } })
        .then(() => refresh()).catch(err => toast(err.message, true));
    }},
    { icon: '⧉', label: 'Copy as curl', action: async () => {
      try {
        const out = await api(`/api/requests/${q.id}/curl?env=${encodeURIComponent(S.envName)}`);
        await copyText(out.curl, 'curl command');
      } catch (err) { toast(err.message, true); }
    }},
    ...(allCols.length > 1 ? [{ icon: '🗀', label: 'Move to collection…', action: async () => {
      const opts = allCols.map(c => ({ value: String(c.id), label: c.name, hint: String(c.id) === String(meta?.col.id) ? 'current' : '' }));
      const choice = await modal.pick('Move to collection', opts);
      if (choice === null) return;
      const colId = parseInt(choice, 10);
      try {
        await moveRequestTo(q.id, colId, null);
        await refresh();
        S.openCols.add(colId);
        renderSide();
        if (S.reqId === q.id) openRequest(q.id);
        toast('Moved to collection');
      } catch (err) { toast(err.message, true); }
    }}] : []),
    '-',
    ...(meta && meta.col.folders.length ? [{ icon: '▤', label: 'Move to folder…', action: async () => {
      const folderOpts = [
        { value: 'root', label: '(collection root)' },
        ...meta.col.folders.map(f => ({ value: String(f.id), label: f.name })),
      ];
      const choice = await modal.pick('Move to folder', folderOpts);
      if (choice === null) return;
      const fid = choice === 'root' ? null : parseInt(choice, 10);
      try {
        const r = await api('/api/requests/' + q.id);
        r.folderId = fid;
        await api('/api/requests/' + q.id, { method: 'PUT', body: r });
        await refresh(); toast('Moved');
      } catch (err) { toast(err.message, true); }
    }}] : []),
    '-',
    { icon: '🗑', label: 'Delete', danger: true, action: async () => {
      if (!await modal.confirm(`Delete "${q.name}"?`, { danger: true, ok: 'Delete' })) return;
      try {
        await api('/api/requests/' + q.id, { method: 'DELETE' });
        if (S.reqId === q.id) { S.reqId = null; S.req = null; $('work').innerHTML = '<div class="empty">Select a request, or create one.</div>'; $('meta').hidden = true; }
        await refresh();
      } catch (err) { toast(err.message, true); }
    }},
  ]);
}

function kvTable(obj, { onchange, secretKeys } = {}) {
  obj = obj || {};
  const table = h('table', { class: 'kv' },
    h('tr', {}, h('th', { style: 'width:34%' }, 'Key'), h('th', {}, 'Value'), h('th', { style: 'width:30px' }, '')));
  const rows = Object.entries(obj);
  const sync = () => {
    const next = {};
    for (const tr of table.querySelectorAll('tr[data-row]')) {
      const [k, v] = tr.querySelectorAll('input');
      if (k.value.trim()) next[k.value.trim()] = v.value;
    }
    onchange(next);
  };
  const addRow = (k = '', v = '') => {
    let keyInput;
    let valueInput;
    const tr = h('tr', { 'data-row': 1 },
      h('td', {}, keyInput = h('input', { type: 'text', value: k, placeholder: 'Key', onchange: sync })),
      h('td', {}, valueInput = h('input', { type: 'text', value: v, placeholder: 'Value', onchange: sync })),
      h('td', {}, h('button', { class: 'delRow', onclick: () => { tr.remove(); sync(); } }, '✕')));
    decorateVarInput(keyInput);
    decorateVarInput(valueInput);
    table.append(tr);
  };
  rows.forEach(([k, v]) => addRow(k, v));
  const wrap = h('div', {}, table,
    h('button', { class: 'addRow', onclick: () => addRow() }, '+ Add row'));
  return wrap;
}

function inheritedHeaderRows() {
  const meta = findReqMeta(S.reqId); if (!meta) return null;
  const col = meta.col;
  const folder = col.folders.find(f => String(f.id) === String(S.req.folderId));
  const rows = [];
  for (const p of S.state.presets || []) {
    const attached = (p.attachments || []).some(a =>
      (a.collectionId && a.collectionId === col.id) || (folder && a.folderId === folder.id));
    if (!attached) continue;
    for (const ph of p.headers || [])
      rows.push([ph.key, ph.secret ? '••••••' : ph.value, 'preset: ' + p.name]);
  }
  for (const [k, v] of Object.entries(col.headers || {})) rows.push([k, v, 'collection']);
  if (folder) for (const [k, v] of Object.entries(folder.headers || {})) rows.push([k, v, 'folder']);
  if (!rows.length) return null;
  const table = h('table', { class: 'kv' },
    h('tr', {}, h('th', { style: 'width:34%' }, 'Inherited'), h('th', {}, 'Value'), h('th', {}, 'From')));
  for (const [k, v, o] of rows)
    table.append(h('tr', { class: 'inherited' }, h('td', {}, k), h('td', {}, esc(v)),
      h('td', {}, h('span', { class: 'origin' }, o))));
  return h('div', { style: 'margin-bottom:12px' }, table,
    h('div', { style: 'color:var(--faint);font-size:11px;margin-top:4px' },
      'Override by re-declaring the key below; set it to an empty value to disable it.'));
}

function renderRequest() {
  const spec = S.req.spec;
  const meta = findReqMeta(S.reqId);
  $('crumb').innerHTML = '';

  setReqDirty(false);

  const editor = h('div', { class: 'card' },
    h('div', { style: 'padding:12px 12px 0;display:flex;align-items:center;gap:8px' },
      h('input', { id: 'reqName', value: spec.name, onchange: (e) => { spec.name = e.target.value; setReqDirty(true); save(); } }),
      h('button', { class: 'iconBtn', id: 'saveReqBtn', title: 'Save request now', onclick: () => saveRequest(true) }, 'Save'),
      h('button', { class: 'iconBtn', title: 'Delete request', onclick: deleteRequest }, '🗑')),
    h('div', { id: 'urlRow' },
      h('select', { id: 'method', onchange: (e) => { spec.method = e.target.value; setReqDirty(true); save(); } },
        METHODS.map(m => h('option', { value: m, selected: spec.method === m ? '' : undefined }, m))),
      h('input', { id: 'url', value: spec.url, placeholder: 'https://{{baseUrl}}/path',
        oninput: (e) => { spec.url = e.target.value; setReqDirty(true); save(); } }),
      h('button', { class: 'btn dark', id: 'sendBtn', onclick: send }, 'Send'),
    ),
    h('div', { style: 'padding:0 12px 10px', id: 'urlVarWrap' }),
    h('div', { class: 'tabs' }, ['params', 'authorization', 'headers', 'body', 'assertions', 'scripts', 'vars'].map(t =>
      h('button', { class: S.tab === t ? 'on' : '', onclick: () => { S.tab = t; renderRequest(); } },
        t[0].toUpperCase() + t.slice(1),
        t === 'headers' && Object.keys(spec.headers || {}).length ? h('span', { class: 'n' }, Object.keys(spec.headers).length) : '',
        t === 'scripts' && (spec.scripts?.preRequest || spec.scripts?.tests) ? h('span', { class: 'n' }, '●') : ''))),
    h('div', { class: 'tabBody', id: 'tabBody' }));
  work.append(editor);
  const urlInput = editor.querySelector('#url');
  decorateVarInput(urlInput);
  const urlVarWrap = editor.querySelector('#urlVarWrap');
  const urlChips = renderVarChips(spec.url || '', { title: 'URL variables' });
  if (urlChips) urlVarWrap.append(urlChips);

  const tb = editor.querySelector('#tabBody');
  if (S.tab === 'params') {
    tb.append(kvTable(spec.query, { onchange: (v) => { spec.query = v; setReqDirty(true); save(); } }));
  } else if (S.tab === 'headers') {
    tb.append(h('div', { class: 'note', style: 'margin-bottom:8px' }, 'Header values support variables, e.g. Authorization: Bearer {{apiToken}}'));
    const hdrText = Object.entries(spec.headers || {}).map(([k, v]) => `${k}: ${v}`).join('\n');
    const hdrChips = renderVarChips(hdrText, { title: 'Header variables' });
    if (hdrChips) tb.append(hdrChips);
    const inh = inheritedHeaderRows(); if (inh) tb.append(inh);
    tb.append(kvTable(spec.headers, { onchange: (v) => { spec.headers = v; setReqDirty(true); save(); } }));
  } else if (S.tab === 'vars') {
    tb.append(kvTable(spec.vars, { onchange: (v) => { spec.vars = v; setReqDirty(true); save(); } }));
  } else if (S.tab === 'authorization') {
    const auth = spec.auth || { type: '' };
    const set = (k, v) => { spec.auth = { ...auth, [k]: v }; if (!spec.auth.type) spec.auth = null; setReqDirty(true); save(); renderRequest(); };
    tb.append(h('div', { class: 'formRow' }, h('label', {}, 'Type'),
      h('select', { onchange: (e) => set('type', e.target.value) },
        ['', 'bearer', 'basic', 'apikey'].map(t => h('option', { value: t, selected: (auth.type || '') === t ? '' : undefined }, t || 'none')))));
    if (auth.type === 'bearer')
      tb.append(h('div', { class: 'formRow' }, h('label', {}, 'Token'),
        h('input', { type: 'text', value: auth.token || '', placeholder: '{{apiToken}}', onchange: (e) => set('token', e.target.value) })));
    if (auth.type === 'basic') {
      tb.append(h('div', { class: 'formRow' }, h('label', {}, 'Username'),
        h('input', { type: 'text', value: auth.username || '', onchange: (e) => set('username', e.target.value) })));
      tb.append(h('div', { class: 'formRow' }, h('label', {}, 'Password'),
        h('input', { type: 'text', value: auth.password || '', placeholder: '{{password}}', onchange: (e) => set('password', e.target.value) })));
    }
    if (auth.type === 'apikey') {
      tb.append(h('div', { class: 'formRow' }, h('label', {}, 'Header/param'),
        h('input', { type: 'text', value: auth.key || '', placeholder: 'X-Api-Key', onchange: (e) => set('key', e.target.value) })));
      tb.append(h('div', { class: 'formRow' }, h('label', {}, 'Value'),
        h('input', { type: 'text', value: auth.value || '', placeholder: '{{apiKey}}', onchange: (e) => set('value', e.target.value) })));
      tb.append(h('div', { class: 'formRow' }, h('label', {}, 'In'),
        h('select', { onchange: (e) => set('in', e.target.value) },
          ['header', 'query'].map(t => h('option', { value: t, selected: (auth.in || 'header') === t ? '' : undefined }, t)))));
    }
    tb.append(h('div', { class: 'note' }, 'Reference secrets by variable ({{apiToken}}) — values come from the selected environment and RELAY_SECRET_* and are masked everywhere.'));
  } else if (S.tab === 'body') {
    const body = spec.body || { type: 'json', content: '' };
    tb.append(h('div', { class: 'bodyToolbar' }, h('label', {}, 'Body type'),
      h('select', { onchange: (e) => {
        const nextType = e.target.value;
        spec.body = nextType === 'none' ? null : { type: nextType, content: body.content || '', formData: body.formData || [] };
        if (nextType === 'formdata' && !(spec.body.formData || []).length) spec.body.formData = [{ key: '', value: '', type: 'text' }];
        setReqDirty(true); save(); renderRequest();
      } },
        ['none', 'json', 'xml', 'raw', 'urlencoded', 'formdata'].map(t => h('option', { value: t, selected: (body.type || 'none') === t ? '' : undefined }, t === 'formdata' ? 'form-data' : t)))));
    if (!spec.body) {
      tb.append(h('div', { class: 'note' }, 'No request body will be sent.'));
    } else if (body.type === 'formdata') {
      tb.append(formDataEditor(body, () => { setReqDirty(true); save(); }));
    } else if (body.type === 'json') {
      const bodyChips = renderVarChips(body.content || '', { title: 'Body variables' });
      if (bodyChips) tb.append(bodyChips);
      const bodyEditor = jsonEditor(body.content || '', (content) => updateBodyContent(body, content, save));
      bodyEditor.classList.add('bodyEditor');
      tb.append(bodyEditor);
    } else {
      const bodyChips = renderVarChips(body.content || '', { title: 'Body variables' });
      if (bodyChips) tb.append(bodyChips);
      const rawBody = h('textarea', { class: 'body', placeholder: '{ "id": "{{testIdNumber}}" }',
        oninput: (e) => updateBodyContent(body, e.target.value, save) }, body.content || '');
      decorateVarInput(rawBody);
      tb.append(rawBody);
    }
  } else if (S.tab === 'assertions') {
    tb.append(buildAssertionsEditor(spec, () => { setReqDirty(true); save(); }));
  } else if (S.tab === 'scripts') {
    const scripts = { preRequest: '', tests: '', ...(spec.scripts || {}) };
    tb.append(renderScriptsTab(spec, scripts, () => { setReqDirty(true); save(); }));

  }

  // response card
  const resp = h('div', { class: 'card', id: 'respCard' });
  renderResponse(resp);
  work.append(resp);

  renderMeta();
}

/* ---------- JS syntax highlighter ---------- */
function highlightJS(code) {
  const escape = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const tokens = [];
  let i = 0;
  while (i < code.length) {
    // line comment
    if (code[i] === '/' && code[i+1] === '/') {
      const end = code.indexOf('\n', i);
      const s = end === -1 ? code.slice(i) : code.slice(i, end);
      tokens.push(`<span class="js-cmt">${escape(s)}</span>`);
      i += s.length; continue;
    }
    // block comment
    if (code[i] === '/' && code[i+1] === '*') {
      const end = code.indexOf('*/', i+2);
      const s = end === -1 ? code.slice(i) : code.slice(i, end+2);
      tokens.push(`<span class="js-cmt">${escape(s)}</span>`);
      i += s.length; continue;
    }
    // string (single, double, template)
    if (code[i] === '"' || code[i] === "'" || code[i] === '`') {
      const q = code[i]; let j = i+1, s = q;
      while (j < code.length) {
        if (code[j] === '\\') { s += code[j] + code[j+1]; j += 2; continue; }
        s += code[j]; if (code[j++] === q) break;
      }
      tokens.push(`<span class="js-str">${escape(s)}</span>`);
      i = j; continue;
    }
    // number
    const nm = /^-?\d+\.?\d*([eE][+-]?\d+)?/.exec(code.slice(i));
    if (nm && (i === 0 || /[\s=+\-*/(,\[]/.test(code[i-1]))) {
      tokens.push(`<span class="js-num">${nm[0]}</span>`);
      i += nm[0].length; continue;
    }
    // identifier / keyword
    const id = /^[a-zA-Z_$][\w$]*/.exec(code.slice(i));
    if (id) {
      const w = id[0];
      const kws = new Set(['var','let','const','function','return','if','else','for','while','do','try','catch','finally','throw','new','this','typeof','instanceof','in','of','break','continue','switch','case','default','true','false','null','undefined']);
      const pmMethods = new Set(['pm','test','expect','environment','collectionVariables','variables','response','request']);
      if (kws.has(w)) tokens.push(`<span class="js-kw">${escape(w)}</span>`);
      else if (pmMethods.has(w)) tokens.push(`<span class="js-pm">${escape(w)}</span>`);
      else tokens.push(escape(w));
      i += w.length; continue;
    }
    tokens.push(escape(code[i])); i++;
  }
  return tokens.join('');
}

function highlightJSON(code) {
  const escape = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const markVars = (s) => s.replace(/\{\{\s*([^{}]+?)\s*\}\}/g, '<span class="var-token">{{$1}}</span>');
  const tokens = [];
  let i = 0;
  while (i < code.length) {
    if (code[i] === '"') {
      let j = i+1, s = '"';
      while (j < code.length) {
        if (code[j] === '\\') { s += code[j] + code[j+1]; j += 2; continue; }
        s += code[j]; if (code[j++] === '"') break;
      }
      const nextNonWs = code.slice(j).match(/\S/);
      if (nextNonWs && nextNonWs[0] === ':') {
        tokens.push(`<span class="json-k">${markVars(escape(s))}</span>`);
      } else {
        tokens.push(`<span class="json-s">${markVars(escape(s))}</span>`);
      }
      i = j; continue;
    }
    const nm = /^-?\d+\.?\d*([eE][+-]?\d+)?/.exec(code.slice(i));
    if (nm && (i === 0 || /[\s:[,\[\{]/.test(code[i-1]))) {
      tokens.push(`<span class="json-n">${nm[0]}</span>`);
      i += nm[0].length; continue;
    }
    if (code.slice(i, i+4) === 'true' || code.slice(i, i+5) === 'false') {
      const w = code.slice(i, i+4) === 'true' ? 'true' : 'false';
      tokens.push(`<span class="json-b">${w}</span>`);
      i += w.length; continue;
    }
    if (code.slice(i, i+4) === 'null') {
      tokens.push(`<span class="json-null">null</span>`);
      i += 4; continue;
    }
    tokens.push(escape(code[i]));
    i++;
  }
  return tokens.join('');
}

function scriptEditor(value, onChange) {
  const wrap = h('div', { class: 'scriptEditor' });
  const lineNums = h('div', { class: 'scriptLineNums' });
  const highlight = h('div', { class: 'scriptHighlight' });
  const ta = h('textarea', { spellcheck: 'false', autocomplete: 'off', autocorrect: 'off',
    autocapitalize: 'off', wrap: 'off', value: value });

  const update = () => {
    const lines = ta.value.split('\n');
    lineNums.textContent = lines.map((_, i) => i+1).join('\n');
    highlight.innerHTML = highlightJS(ta.value) + '\n';
    onChange(ta.value);
  };
  const syncScroll = () => {
    highlight.scrollTop = ta.scrollTop;
    highlight.scrollLeft = ta.scrollLeft;
    lineNums.style.transform = `translateY(${-ta.scrollTop}px)`;
  };
  ta.addEventListener('input', update);
  ta.addEventListener('scroll', syncScroll);
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart, end = ta.selectionEnd;
      ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(end);
      ta.selectionStart = ta.selectionEnd = s + 2;
      update();
    }
  });
  wrap.append(lineNums, highlight, ta);
  setTimeout(update, 0);
  return wrap;
}

  const wrap = h('div', { class: 'scriptEditor' });

    lineNums.style.transform = `translateY(${-ta.scrollTop}px)`;
  };
  ta.addEventListener('input', update);

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {

      ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(end);
      ta.selectionStart = ta.selectionEnd = s + 2;

  wrap.append(lineNums, highlight, ta);

function updateBodyContent(body, content, save) {
  S.req.spec.body = { ...body, content };
  if (!S.req.spec.body.content) S.req.spec.body = null;
  setReqDirty(true);
  save();
}

function formDataEditor(body, save) {
  const fields = (body.formData || []).map(f => ({ type: 'text', ...f }));
  const table = h('table', { class: 'formData' },
    h('tr', {},
      h('th', { style: 'width:36px' }, 'On'),
      h('th', { style: 'width:26%' }, 'Key'),
      h('th', { style: 'width:110px' }, 'Type'),
      h('th', {}, 'Value / file path'),
      h('th', { style: 'width:34px' }, '')));
  const sync = () => {
    const next = [];
    for (const tr of table.querySelectorAll('tr[data-row]')) {
      const enabled = tr.querySelector('input[type=checkbox]').checked;
      const key = tr.querySelector('[data-field=key]').value;
      const type = tr.querySelector('[data-field=type]').value;
      const value = tr.querySelector('[data-field=value]').value;
      const field = { key, type, disabled: !enabled };
      if (type === 'file') field.file = value;
      else field.value = value;
      if (key || value) next.push(field);
    }
    S.req.spec.body = { type: 'formdata', formData: next };
    save();
  };
  const addRow = (field = { key: '', value: '', type: 'text' }) => {
    let valueInput;
    const tr = h('tr', { 'data-row': 1 },
      h('td', {}, h('input', { type: 'checkbox', checked: !field.disabled, onchange: sync })),
      h('td', {}, h('input', { type: 'text', 'data-field': 'key', value: field.key || '', placeholder: 'field', oninput: sync })),
      h('td', {}, h('select', { 'data-field': 'type', onchange: (e) => {
        valueInput.placeholder = e.target.value === 'file' ? './upload.pdf' : 'value';
        sync();
      } }, ['text', 'file'].map(t => h('option', { value: t, selected: (field.type || 'text') === t ? '' : undefined }, t)))),
      h('td', {}, valueInput = h('input', { type: 'text', 'data-field': 'value', value: field.type === 'file' ? (field.file || '') : (field.value || ''), placeholder: field.type === 'file' ? './upload.pdf' : 'value', oninput: sync })),
      h('td', {}, h('button', { class: 'delRow', onclick: () => { tr.remove(); sync(); } }, '✕')));
    table.append(tr);
  };
  fields.forEach(addRow);
  if (!fields.length) addRow();
  return h('div', {}, h('div', { class: 'formDataWrap' }, table),
    h('button', { class: 'addRow', onclick: () => { addRow(); sync(); } }, '+ Add form field'));
}

const PM_SNIPPETS = [
  ['Status 200', `pm.test("Status is 200", function() {\n  pm.expect(pm.response.code).to.equal(200);\n});\n`],
  ['JSON field', `pm.test("Field equals value", function() {\n  var j = pm.response.json();\n  pm.expect(j.field).to.equal("expected");\n});\n`],
  ['Response time', `pm.test("Response under 500ms", function() {\n  pm.expect(pm.response.responseTime).to.be.below(500);\n});\n`],
  ['Header present', `pm.test("Content-Type is JSON", function() {\n  pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");\n});\n`],
  ['Set env var', `pm.environment.set("token", pm.response.json().token);\n`],
  ['Get env var', `var token = pm.environment.get("token");\n`],
  ['Body contains', `pm.test("Body contains string", function() {\n  pm.expect(pm.response.text()).to.include("expected text");\n});\n`],
];

function renderScriptsTab(reqSpec, scripts, save) {
  let activeSubTab = S.scriptSubTab || 'tests';
  const wrap = h('div', {});

  const subTabs = h('div', { class: 'scriptSubTabs' });
  const renderSub = (key) => {
    wrap.querySelectorAll('.scriptEditorArea, .scriptSnippets, .note').forEach(el => el.remove());
    activeSubTab = key;
    S.scriptSubTab = key;
    subTabs.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.sub === key));

    const specKey = key === 'tests' ? 'tests' : 'preRequest';

    // Snippets bar.
    const snippetsBar = h('div', { class: 'scriptSnippets' });
    PM_SNIPPETS.forEach(([label, code]) => {
      snippetsBar.append(h('button', { onclick: () => {
        scripts[specKey] = (scripts[specKey] || '') + code;
        reqSpec.scripts = { ...scripts };
        save();
        renderSub(key);
      } }, '+ ' + label));
    });

    const ed = scriptEditor(scripts[specKey] || '', (val) => {
      scripts[specKey] = val;
      reqSpec.scripts = { ...scripts };
      save();
    });
    const edArea = h('div', { class: 'scriptEditorArea scriptWrap' }, ed);

    const note = key === 'pre-request'
      ? h('div', { class: 'note', style: 'margin-top:8px' }, 'Pre-request scripts run before send. Use pm.environment.set() to mutate variables.')
      : h('div', { class: 'note', style: 'margin-top:8px' }, 'Test scripts run after the response. pm.test() / pm.expect() results appear alongside TOML assertions after Send.');

    wrap.append(snippetsBar, edArea, note);
  };

  for (const [label, key] of [['Pre-request', 'pre-request'], ['Tests', 'tests']]) {
    const btn = h('button', { 'data-sub': key, onclick: () => renderSub(key) }, label);
    if (key === activeSubTab) btn.classList.add('on');
    subTabs.append(btn);
  }
  wrap.append(subTabs);
  renderSub(activeSubTab);
  return wrap;
}

function renderResponse(card) {
  card = card || $('respCard'); if (!card) return;
  card.innerHTML = '';
  const r = S.last;
  card.classList.toggle('hasResp', !!r);
  const metaBar = h('div', { id: 'respMeta' }, h('span', { class: 'lbl' }, 'RESPONSE'));
  if (!r) {
    metaBar.append(h('span', { style: 'color:var(--faint)' }, '—'));
    card.append(metaBar);
    return;
  }
  const ok = r.status >= 200 && r.status < 400;
  metaBar.append(
    h('span', { class: 'pill ' + (ok ? 'ok' : 'bad') }, h('span', { class: 'dot' }), `${r.status} ${esc(r.statusText).replace(/^\d+ /, '')}`),
    h('span', {}, `Time: ${r.timing.total.toFixed(0)}ms`),
    h('span', {}, `Size: ${fmtSize(r.size)}${r.truncated ? ' (view truncated)' : ''}`),
    h('span', { class: 'actions' },
      h('button', { class: 'iconBtn', title: 'Copy response body', onclick: () => copyText(r.body, 'Body') }, '⧉ Body'),
      h('button', { class: 'iconBtn', title: 'Copy as curl (secrets become $RELAY_SECRET_* references)', onclick: copyCurl }, '⧉ curl')));
  const nHdr = Object.keys(r.headers).length;
  const tabs = h('div', { class: 'tabs' }, ['body', 'headers', 'timing'].map(t =>
    h('button', { class: (S.respTab || 'body') === t ? 'on' : '', onclick: () => { S.respTab = t; renderResponse(); } },
      t[0].toUpperCase() + t.slice(1),
      t === 'headers' && nHdr ? h('span', { class: 'n' }, nHdr) : '')));
  card.append(metaBar, tabs);
  const t = S.respTab || 'body';
  if (t === 'body') {
    card.append(h('pre', { id: 'respBody' }, ...prettyJSON(r.body)));
  } else if (t === 'headers') {
    card.append(h('div', { class: 'hdrWrap' },
      headerSection('Response headers', r.headers, null, nHdr),
      headerSection('Request headers · as sent', r.requestHeaders, r.headerOrigin,
        Object.keys(r.requestHeaders).length)));
  } else {
    const tm = r.timing, total = Math.max(tm.total, 0.001);
    card.append(h('div', { id: 'timingBars' },
      ['dns', 'connect', 'tls', 'ttfb', 'download'].map(k =>
        h('div', {}, `${k.padEnd(8)} `, h('b', {}, tm[k].toFixed(1) + 'ms'),
          h('span', { class: 'bar', style: `width:${Math.max(2, 220 * tm[k] / total)}px` })))));
  }
  const allTests = [
    ...(r.assertions || []).map(a => ({ label: a.type + ': ' + a.message, passed: a.passed, src: 'assert', assertion: a })),
    ...(r.scriptTests || []).map(t => ({ label: t.name + (t.error ? ': ' + t.error : ''), passed: t.passed, src: 'pm.test' })),
  ];
  if (allTests.length) {
    card.append(h('div', { id: 'assertChips' }, allTests.map(a =>
      h('span', {
        class: 'chip ' + (a.passed ? 'ok' : 'bad') + (a.src === 'assert' ? ' clickable' : ''),
        title: a.src === 'assert' ? 'Click to add to request' : a.label,
        style: a.src === 'assert' ? 'cursor:pointer' : '',
        onclick: a.src === 'assert' ? () => addAssertionFromHistory(a.assertion) : undefined
      },
        (a.passed ? '✓ ' : '✕ ') + (a.src === 'pm.test' ? '●' : '') + ' ' + a.label))));
  }
}

// headerSection renders one titled header table. origins (when given) adds
// a provenance badge per row: preset / collection / folder / auth.
function headerSection(title, headers, origins, count) {
  const names = Object.keys(headers).sort();
  const wrap = h('div', {},
    h('div', { class: 'hdrTitle' }, title, count ? h('span', { class: 'n' }, count) : ''));
  if (!names.length) {

function prettyJSON(text) {
  try {
    const pretty = JSON.stringify(JSON.parse(text), null, 2);
    const out = [];
    const re = /("(?:[^"\\]|\\.)*")(\s*:)?|(-?\d+\.?\d*(?:[eE][+-]?\d+)?)/g;
    let i = 0, m;
    while ((m = re.exec(pretty))) {
      if (m.index > i) out.push(pretty.slice(i, m.index));
      if (m[1] && m[2]) { out.push(h('span', { class: 'json-k' }, m[1]), m[2]); }
      else if (m[1]) out.push(h('span', { class: 'json-s' }, m[1]));
      else out.push(h('span', { class: 'json-n' }, m[3]));
      i = re.lastIndex;
    }
    out.push(pretty.slice(i));
    return out;
  } catch { return [text]; }
}
