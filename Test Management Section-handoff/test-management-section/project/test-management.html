<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Relay — Test Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #f4f5fa; --panel: #ffffff; --line: #e6e8f2; --line2: #d9dcea;
    --fg: #1c1f33; --dim: #7c819a; --faint: #a4a8bd;
    --ink: #28287a; --ink-hover: #1d1d5e; --ink-soft: #eceefc;
    --green: #0e9f6e; --red: #d64545; --amber: #c26a1b; --blue: #2563eb; --purple: #7c3aed;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font: 13px/1.5 "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
         display: flex; flex-direction: column;
         -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
         text-rendering: optimizeLegibility; letter-spacing: -0.003em;
         font-feature-settings: "cv05", "cv08", "ss01", "cv11"; }
  /* mono everywhere technical: even color, calm ligatures, tabular figures */
  .mono, .ro, .method, code, kbd, pre, textarea.scriptEd, .scriptEd, input.mono,
  .keyInput, .srcPill, .xrayTag, .execKey, .tagExpr, .codePrev, #statusbar,
  .asrtFields input[type=text], .runMeta, .rt, .reqChip, .inherited, .mapRow .key {
    font-feature-settings: "tnum" 1, "zero" 1, "ss01" 1, "cv01" 1;
    font-variant-ligatures: none; -webkit-font-smoothing: antialiased; }
  #app { flex: 1; display: flex; min-height: 0; overflow-x: auto; }
  button { font: inherit; cursor: pointer; }
  input, select, textarea { font: inherit; color: var(--fg); }
  input[type=text], input[type=password], select, textarea {
    border: 1px solid var(--line2); border-radius: 7px; padding: 6px 9px;
    background: #fff; outline: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--ink); }
  ::placeholder { color: var(--faint); }
  :focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }

  /* ---- nav rail ---- */
  #rail { width: 185px; flex: none; background: var(--panel); border-right: 1px solid var(--line);
          display: flex; flex-direction: column; padding: 14px 10px; gap: 4px; }
  #brand { display: flex; align-items: center; gap: 8px; padding: 0 6px 12px; }
  #brand .logo { width: 26px; height: 26px; border-radius: 7px; background: var(--ink);
                 color: #fff; display: grid; place-items: center; font-weight: 800; }
  #brand b { font-size: 14px; } #brand small { display: block; color: var(--dim); font-size: 10px;
             text-transform: uppercase; letter-spacing: .06em; }
  #newReq { margin: 0 2px 12px; padding: 8px; border: 1px solid var(--line2); border-radius: 8px;
            background: #fff; color: var(--fg); font-weight: 600; }
  #newReq:hover { border-color: var(--ink); color: var(--ink); }
  .navItem { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 8px;
             color: var(--dim); border: 0; background: none; text-align: left; width: 100%; font-weight: 500; }
  .navItem .ico { width: 15px; flex: none; text-align: center; }
  .navItem:hover { background: var(--ink-soft); color: var(--ink); }
  .navItem.on { background: var(--ink-soft); color: var(--ink); font-weight: 700; }
  .navItem:disabled { color: var(--faint); pointer-events: none; }
  .navItem .tag { margin-left: auto; font-size: 9px; color: var(--faint); border: 1px solid var(--line2);
                  padding: 0 5px; border-radius: 99px; }
  #railSpace { flex: 1; }

  /* ---- side panel: suite tree ---- */
  #side { width: 248px; flex: none; background: var(--panel); border-right: 1px solid var(--line);
          display: flex; flex-direction: column; min-height: 0; }
  #sideHead { padding: 14px 14px 8px; }
  #sideHead h2 { margin: 0; font-size: 11px; letter-spacing: .1em; color: var(--dim); font-weight: 700; }
  #sideSearch { width: 100%; margin-top: 8px; font-size: 12px; padding: 6px 9px; }
  #filterChips { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px 12px 8px;
                 border-bottom: 1px solid var(--line); }
  .fchip { font-size: 10.5px; border: 1px solid var(--line2); background: #fff; color: var(--dim);
           border-radius: 99px; padding: 2px 9px; font-weight: 600; display: inline-flex; gap: 5px;
           align-items: center; white-space: nowrap; }
  .fchip:hover { border-color: var(--ink); color: var(--ink); }
  .fchip.on { background: var(--ink-soft); border-color: var(--ink); color: var(--ink); }
  .fchip .c { font-family: var(--mono); font-size: 9.5px; opacity: .8; }
  #sideList { flex: 1; overflow: auto; padding: 6px 8px 12px; }
  .colRow { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 7px;
            cursor: pointer; font-weight: 600; }
  .colRow:hover { background: var(--ink-soft); }
  .colRow .car { color: var(--faint); font-size: 10px; width: 10px; }
  .colRow .runBtn { margin-left: auto; border: 0; background: none; color: var(--faint); font-size: 12px; }
  .colRow .runBtn:hover { color: var(--ink); }
  .folderRow { display: flex; align-items: center; gap: 6px; padding: 5px 8px 5px 18px; color: var(--dim);
               font-weight: 600; cursor: pointer; border-radius: 7px; }
  .folderRow:hover { background: var(--ink-soft); }
  .folderRow .car { color: var(--faint); font-size: 10px; width: 10px; }
  .reqRow { display: flex; align-items: center; gap: 7px; padding: 5px 8px 5px 22px; border-radius: 7px;
            cursor: pointer; color: var(--fg); }
  .reqRow:hover { background: var(--ink-soft); }
  .reqRow.on { background: var(--ink-soft); outline: 1px dashed var(--ink); }
  .reqRow .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .method { font-family: var(--mono); font-size: 9.5px; font-weight: 700; letter-spacing: .03em; flex: none; }
  .m-GET { color: var(--green); } .m-POST { color: var(--amber); } .m-PUT { color: var(--blue); }
  .m-PATCH { color: var(--purple); } .m-DELETE { color: var(--red); }
  .m-HEAD, .m-OPTIONS { color: var(--dim); }
  /* tree micro-indicators */
  .lastDot { width: 8px; height: 8px; border-radius: 99px; flex: none; }
  .lastDot.pass { background: var(--green); }
  .lastDot.fail { background: var(--red); }
  .lastDot.never { background: transparent; border: 1.5px solid var(--faint); }
  .xrayTag { font-family: var(--mono); font-size: 9px; color: var(--ink); background: var(--ink-soft);
             border-radius: 4px; padding: 0 4px; flex: none; }
  .unlinkedDot { width: 7px; height: 7px; border-radius: 99px; background: var(--faint); opacity: .45; flex: none; }

  /* ---- main ---- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 650px; }
  #topbar { height: 50px; display: flex; align-items: center; gap: 10px; padding: 0 18px;
            background: var(--panel); border-bottom: 1px solid var(--line); }
  #crumb { color: var(--dim); font-weight: 600; }
  #crumb b { color: var(--fg); }
  #crumb .sep { color: var(--faint); margin: 0 6px; }
  #topbar .grow { flex: 1; }
  .btn { border: 1px solid var(--line2); background: #fff; border-radius: 8px; padding: 7px 14px;
         font-weight: 600; color: var(--fg); white-space: nowrap; }
  .btn:hover { border-color: var(--ink); color: var(--ink); }
  .btn.dark { background: var(--ink); border-color: var(--ink); color: #fff; }
  .btn.dark:hover { background: var(--ink-hover); }
  .btn.sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: .5; pointer-events: none; }
  #content { flex: 1; display: flex; min-height: 0; }
  #work { flex: 1; display: flex; flex-direction: column; min-width: 420px; padding: 16px 18px; gap: 14px;
          overflow: auto; align-content: flex-start; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
          min-width: 0; max-width: 100%; overflow: hidden; flex: none; }
  .secHd { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--line);
           font-size: 10px; letter-spacing: .08em; color: var(--dim); font-weight: 700; text-transform: uppercase; }
  .secHd .n { background: var(--ink-soft); color: var(--ink); border-radius: 99px; padding: 0 7px;
              font-size: 10px; letter-spacing: 0; }
  .secHd .grow { flex: 1; }
  .secBody { padding: 12px 14px; }

  /* identity */
  .idTop { display: flex; align-items: center; gap: 10px; }
  #testName { border: 0; font-weight: 700; font-size: 15px; flex: 1; padding: 0 0 2px; min-width: 0; }
  #testName:focus { outline: none; border-bottom: 1px dashed var(--ink); }
  .idGrid { display: grid; grid-template-columns: max-content minmax(0, 1fr); gap: 8px 14px; margin-top: 12px; align-items: center; }
  .idGrid > * { min-width: 0; }
  .idGrid .k { font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--dim); font-weight: 700; align-self: center; }
  .mono { font-family: var(--mono); }
  .ro { font-family: var(--mono); font-size: 12px; color: var(--fg); overflow-wrap: anywhere; }
  .srcPill { font-family: var(--mono); font-size: 11px; color: var(--dim); border: 1px solid var(--line2);
             background: #fafbfe; border-radius: 99px; padding: 2px 4px 2px 9px; display: inline-flex; gap: 6px;
             align-items: center; cursor: help; max-width: 100%; }
  .srcPill .pathtxt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 2.5em; flex: 1 1 auto; }
  .srcPill .sot { font-family: "Inter", system-ui, sans-serif; font-size: 9px; letter-spacing: .03em;
                  color: var(--ink); background: var(--ink-soft); border-radius: 99px; padding: 1px 7px;
                  font-weight: 700; flex: none; white-space: nowrap; }
  .tagWrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tagChip { font-size: 11px; border-radius: 99px; padding: 2px 4px 2px 10px; font-weight: 600;
             background: var(--ink-soft); color: var(--ink); display: inline-flex; align-items: center; gap: 4px; }
  .tagChip button { border: 0; background: none; color: var(--ink); opacity: .6; font-size: 13px; line-height: 1; padding: 0 3px; }
  .tagChip button:hover { opacity: 1; }
  .addTag { font-size: 11px; border: 1px dashed var(--line2); background: none; color: var(--dim);
            border-radius: 99px; padding: 2px 10px; font-weight: 600; }
  .addTag:hover { color: var(--ink); border-color: var(--ink); }
  .idInline { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .idInline select { padding: 4px 8px; font-size: 12px; min-width: 78px; }
  .prio { font-size: 10px; font-weight: 800; letter-spacing: .04em; border-radius: 4px; padding: 2px 7px; }
  .prio.high { background: #fdecec; color: var(--red); }
  .prio.med { background: #fdf3e6; color: var(--amber); }
  .prio.low { background: var(--ink-soft); color: var(--ink); }
  /* toggle */
  .toggle { position: relative; width: 34px; height: 19px; border-radius: 99px; background: var(--line2);
            border: 0; padding: 0; flex: none; transition: background .15s; }
  .toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 15px; height: 15px;
                   border-radius: 99px; background: #fff; transition: transform .15s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .toggle.on { background: var(--green); }
  .toggle.on::after { transform: translateX(15px); }

  /* assertion builder */
  table.asrt { width: 100%; border-collapse: collapse; }
  table.asrt th { text-align: left; font-size: 10px; letter-spacing: .08em; color: var(--dim);
                  text-transform: uppercase; padding: 6px 10px; border-bottom: 1px solid var(--line); font-weight: 700; }
  table.asrt td { padding: 6px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.asrt tr:hover td { background: #fafbfe; }
  .asrtType { font-size: 10px; font-weight: 800; letter-spacing: .03em; text-transform: uppercase;
              border-radius: 4px; padding: 2px 7px; white-space: nowrap; }
  .asrtType.status { background: #e7f0fd; color: var(--blue); }
  .asrtType.header { background: var(--ink-soft); color: var(--ink); }
  .asrtType.json { background: #f0e9fd; color: var(--purple); }
  .asrtType.text { background: #fdf3e6; color: var(--amber); }
  .asrtType.timing { background: #e7f7f0; color: var(--green); }
  .asrtType.script { background: #f1f2f9; color: var(--dim); }
  .asrtFields { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .asrtFields input[type=text] { border: 1px solid var(--line2); background: #fff; font-family: var(--mono);
                                 font-size: 12px; padding: 3px 7px; border-radius: 6px; }
  .asrtFields input.exp { min-width: 90px; }
  .asrtFields input.path { min-width: 150px; }
  .asrtFields select { border: 1px solid var(--line2); background: #fff; font-size: 11.5px;
                       padding: 3px 6px; border-radius: 6px; color: var(--dim); }
  .asrtFields .unit { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  td.asrtRes { width: 1%; white-space: nowrap; }
  td.asrtDel { width: 1%; }
  .chip { font-size: 11px; border-radius: 99px; padding: 2px 10px; font-weight: 600; white-space: nowrap; }
  .chip.ok { background: #e7f7f0; color: var(--green); }
  .chip.bad { background: #fdecec; color: var(--red); }
  .chip.neutral { background: #f1f2f9; color: var(--dim); }
  .delRow { border: 0; background: none; color: var(--faint); font-size: 14px; padding: 0 4px; }
  .delRow:hover { color: var(--red); }
  .addRow { margin: 10px 14px 12px; width: calc(100% - 28px); border: 1px dashed var(--line2); background: none;
            color: var(--dim); padding: 7px; border-radius: 7px; font-weight: 600; }
  .addRow:hover { color: var(--ink); border-color: var(--ink); }
  /* script assertion row */
  .scriptRow td { background: #fafbfe; }
  .scriptEd { font-family: var(--mono); font-size: 12px; width: 100%; min-height: 84px; resize: vertical;
              border: 1px solid var(--line2); border-radius: 7px; padding: 8px 10px; line-height: 1.6;
              white-space: pre; overflow: auto; }

  /* traceability */
  .traceGrid { display: grid; grid-template-columns: max-content minmax(0, 1fr); gap: 9px 14px; align-items: center; }
  .traceGrid > * { min-width: 0; }
  .traceGrid .k { font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--dim); font-weight: 700; }
  .keyInput { font-family: var(--mono); font-size: 12.5px; width: 160px; max-width: 100%; }
  .reqChip { font-family: var(--mono); font-size: 11px; border-radius: 6px; padding: 2px 4px 2px 8px;
             background: var(--ink-soft); color: var(--ink); display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
  .reqChip button { border: 0; background: none; color: var(--ink); opacity: .55; font-size: 13px; line-height: 1; padding: 0 2px; }
  .reqChip button:hover { opacity: 1; }
  .inherited { color: var(--faint); font-family: var(--mono); font-size: 12px; }
  .traceActions { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 4px; }
  .valMsg { font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; margin-left: 4px; }
  .valMsg.ok { color: var(--green); }
  .valMsg.bad { color: var(--red); font-family: var(--mono); }
  /* coverage strip */
  .covStrip { display: flex; align-items: stretch; gap: 0; margin-top: 14px; border: 1px solid var(--line);
              border-radius: 8px; overflow: hidden; }
  .covNode { flex: 1; padding: 10px 14px; display: flex; flex-direction: column; gap: 3px; position: relative; }
  .covNode + .covNode { border-left: 1px solid var(--line); }
  .covNode .lbl { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--faint); font-weight: 700; }
  .covNode .val { font-family: var(--mono); font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .covNode .arrow { position: absolute; right: -9px; top: 50%; transform: translateY(-50%); z-index: 2;
                    width: 18px; height: 18px; border-radius: 99px; background: var(--panel); border: 1px solid var(--line);
                    display: grid; place-items: center; font-size: 10px; color: var(--dim); }
  .covNode.good { background: #f3fbf7; } .covNode.good .val { color: var(--green); }
  .covNode.bad { background: #fdf4f4; } .covNode.bad .val { color: var(--red); }
  .covNode.gap { background: repeating-linear-gradient(45deg, #fafbfe, #fafbfe 6px, #f1f2f9 6px, #f1f2f9 12px); }
  .covNode.gap .val { color: var(--faint); }

  /* last run */
  .runMeta { display: flex; gap: 18px; align-items: baseline; padding: 11px 14px; border-bottom: 1px solid var(--line);
             font-family: var(--mono); font-size: 12.5px; }
  .runMeta .lbl { font-size: 9.5px; letter-spacing: .1em; color: var(--dim); font-weight: 700; font-family: "Inter", system-ui, sans-serif; }
  .pill { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; }
  .pill .dot { width: 7px; height: 7px; border-radius: 99px; background: var(--green); }
  .pill.bad .dot { background: var(--red); }
  .pill.bad { color: var(--red); } .pill.ok { color: var(--green); }
  .runRow { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--line); }
  .runRow:last-child { border-bottom: 0; }
  .runRow .ic { font-weight: 800; width: 14px; text-align: center; }
  .runRow .ic.ok { color: var(--green); } .runRow .ic.bad { color: var(--red); }
  .runRow .rdesc { flex: 1; }
  .runRow .rdesc .mono { color: var(--dim); }
  .runRow .rt { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .runErr { font-family: var(--mono); font-size: 12px; color: var(--red); background: #fdf3f3;
            border: 1px solid #f3d4d4; border-radius: 7px; padding: 8px 12px; margin: 0 14px 10px 38px; }
  .runErr .lbl { color: var(--dim); display: block; font-size: 10px; margin-bottom: 2px; letter-spacing: .06em; }
  .empty { color: var(--dim); padding: 32px; text-align: center; }
  /* ---- variable / technical highlighting ---- */
  .tok-var { color: var(--amber); background: #fbf2e6; border: 1px solid #f0ddc2;
             border-radius: 4px; padding: 0 2px; font-size: .94em; font-weight: 600;
             cursor: help; white-space: nowrap; }
  .tok-var .br { color: var(--amber); opacity: .5; }
  .tok-path { color: var(--purple); font-weight: 600; }
  .tok-path .dot { color: var(--faint); font-weight: 400; }
  .tok-str { color: var(--green); }
  .tok-num { color: var(--blue); font-feature-settings: "tnum" 1; }
  .tok-kw { color: var(--dim); font-weight: 600; }
  .tok-mac { color: var(--ink); font-weight: 600; }
  .tok-obj { color: var(--dim); }

  /* ---- assertion view switcher + quantifiers + CEL ---- */
  .asrtType.forall { background: #e7f0fd; color: var(--blue); }
  .asrtType.exists { background: #f0e9fd; color: var(--purple); }
  .asrtType.count  { background: #e7f7f0; color: var(--green); }
  .viewSeg { display: inline-flex; border: 1px solid var(--line2); border-radius: 7px; overflow: hidden; }
  .viewSeg button { border: 0; background: #fff; padding: 4px 11px; color: var(--dim); font-weight: 700;
                    font-size: 10px; letter-spacing: .04em; text-transform: uppercase; border-right: 1px solid var(--line); }
  .viewSeg button:last-child { border-right: 0; }
  .viewSeg button.on { background: var(--ink-soft); color: var(--ink); }
  .celLine { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 4px;
             padding-left: 1px; white-space: pre-wrap; word-break: break-word; }
  .celLine .tok-obj { color: var(--faint); }
  .compiledHd { display: flex; align-items: center; gap: 8px; padding: 9px 14px 0; }
  .compiledHd .lang { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--ink);
                      background: var(--ink-soft); border-radius: 4px; padding: 1px 7px; }
  .compiledHd .note { font-size: 11px; color: var(--faint); }
  .celEd { font-family: var(--mono); font-size: 12.5px; line-height: 1.7; width: calc(100% - 28px);
           margin: 8px 14px 14px; min-height: 120px; resize: vertical; border: 1px solid var(--line2);
           border-radius: 8px; padding: 10px 12px; white-space: pre; overflow: auto; tab-size: 2;
           font-feature-settings: "tnum" 1, "zero" 1; }
  .celPre { font-family: var(--mono); font-size: 12.5px; line-height: 1.7; margin: 8px 14px 14px;
            border: 1px solid var(--line); border-radius: 8px; padding: 11px 13px; white-space: pre-wrap;
            word-break: break-word; background: #f8f9fe; color: var(--fg); overflow: auto; }
  .fromRespBtn { border: 1px solid var(--line2); background: #fff; color: var(--ink); border-radius: 7px;
                 padding: 4px 10px; font-weight: 600; font-size: 12px; }
  .fromRespBtn:hover { border-color: var(--ink); background: var(--ink-soft); }

  /* ---- response JSON tree ---- */
  .jtree { font-family: var(--mono); font-size: 12.5px; line-height: 1.85; border: 1px solid var(--line);
           border-radius: 8px; padding: 10px 12px; background: #fcfcff; max-height: 52vh; overflow: auto; }
  .jrow { display: flex; align-items: center; gap: 6px; padding: 1px 0; border-radius: 5px; }
  .jrow:hover { background: var(--ink-soft); }
  .jind { display: inline-block; }
  .jkey { color: var(--purple); }
  .jpunct { color: var(--faint); }
  .jval { cursor: pointer; border-radius: 4px; padding: 0 3px; }
  .jval.str { color: var(--green); } .jval.num { color: var(--blue); } .jval.bool { color: var(--amber); }
  .jval.null { color: var(--faint); }

'use strict';
const $ = (id) => document.getElementById(id);
const h = (tag, attrs = {}, ...kids) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v === undefined || v === null || v === false) continue;
    if (k === 'class') el.className = v;
    else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
    else if (k === 'value') el.value = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v === true ? '' : v);
  }
  for (const k of kids.flat()) if (k !== null && k !== undefined && k !== false) el.append(k);
  return el;
};
let toastT;
function toast(msg, err) {
  const t = $('toast'); t.textContent = msg; t.className = err ? 'err' : '';
  t.style.display = 'block'; clearTimeout(toastT);
  toastT = setTimeout(() => { t.style.display = 'none'; }, 2600);
}

const rid = (n=900) => 100 + Math.floor(Math.random()*n);
function download(name, text, type) {
  const blob = new Blob([text], { type }); const url = URL.createObjectURL(blob);
  const a = h('a', { href:url, download:name }); document.body.append(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// resolved values for {{vars}} in the active environment (tooltip on hover)
const ENV_VARS = { baseUrl:'https://api.staging.nobagz.co.za' };
// highlight {{template vars}} inside an otherwise-plain (URL/path) string
function hlVars(str) {
  return escHtml(str).replace(/\{\{\s*([\w.-]+)\s*\}\}/g, (m, name) => {
    const val = ENV_VARS[name];
    const tip = val ? name + ' = ' + val : name + ' (unresolved)';
    return `<span class="tok-var" title="${escHtml(tip)}"><span class="br">{{</span>${escHtml(name)}<span class="br">}}</span></span>`;
  });
}
// highlight an assertion description: JSONPath, quoted strings, numbers, vars
function hlDesc(str) {
  let s = escHtml(str);
  s = s.replace(/\{\{\s*([\w.-]+)\s*\}\}/g, (m,n)=>`<span class="tok-var"><span class="br">{{</span>${escHtml(n)}<span class="br">}}</span></span>`);
  s = s.replace(/(\$(?:\.[\w$*]+|\[[^\]]+\])+)/g, (m)=>'<span class="tok-path">'+m.replace(/\./g,'<span class="dot">.</span>')+'</span>');
  s = s.replace(/&quot;([^&]*?)&quot;/g, '<span class="tok-str">&quot;$1&quot;</span>');
  s = s.replace(/\b(equals|contains|exists|is one of|is 2xx|does not contain|length|total)\b/g, '<span class="tok-kw">$1</span>');
  s = s.replace(/\b(\d+(?:xx|ms)?)\b/g, '<span class="tok-num">$1</span>');
  return s;
}

function escClose(e) { if (e.key === 'Escape') closeModal(); }
function closeModal() { const m = $('__modal'); if (m) m.remove(); document.removeEventListener('keydown', escClose); }
function openModal(opts) {
  closeModal();
  const box = h('div', { class:'mbox' + (opts.wide ? ' wide' : '') , role:'dialog', 'aria-modal':'true', 'aria-label':opts.title });
  box.append(h('div', { class:'mhd' },
    h('div', {}, h('div', { class:'mttl' }, opts.title), opts.subtitle ? h('div', { class:'msub' }, opts.subtitle) : null),
    h('button', { class:'mclose', 'aria-label':'Close dialog', onclick:closeModal }, '×')));
  const body = h('div', { class:'mbody' }); box.append(body);
  opts.build(body, box);
  if (opts.actions) { const foot = h('div', { class:'mfoot' }); opts.actions(foot, box); box.append(foot); }
  const ovl = h('div', { id:'__modal', class:'ovl open', onclick:(e)=>{ if (e.target === ovl) closeModal(); } }, box);
  document.body.append(ovl);
  document.addEventListener('keydown', escClose);
  const first = box.querySelector('input,select,textarea,button:not(.mclose)'); if (first) first.focus();
}
function frow(label, control, hint, cls) {
  return h('div', { class:'frow' + (cls?' '+cls:'') },

/* ---------------- CEL compiler (visual builder → readable, diffable expression) ---------------- */
function pathToCEL(p) {
  if (!p) return 'response.body';
  let s = String(p).replace(/^\$\.?/, '');
  if (!s) return 'response.body';
  const parts = []; let buf = '';
  s.split('.').forEach(seg => {
    const m = seg.match(/^([\w$]+)?(\[[^\]]*\])?$/);
    if (m) parts.push((m[1] ? '.' + m[1] : '') + (m[2] || ''));
    else parts.push('.' + seg);
  });
  return 'response.body' + parts.join('');
}
function celVal(v) {
  if (v === '' || v == null) return '""';
  if (/^-?\d+(\.\d+)?$/.test(String(v).trim())) return String(v).trim();
  if (/^(true|false)$/.test(String(v).trim())) return String(v).trim();
  return JSON.stringify(String(v));
}
function celList(v) { return '[' + String(v).split(',').map(s => s.trim()).filter(Boolean).join(', ') + ']'; }
function toCEL(a) {
  switch (a.type) {
    case 'status':
      if (a.op === 'is2xx') return 'response.status >= 200 && response.status < 300';
      if (a.op === 'oneof') return 'response.status in ' + celList(a.exp);
      return 'response.status == ' + (a.exp || '200');
    case 'header': {
      const hk = 'response.headers[' + JSON.stringify(a.name || '') + ']';
      if (a.op === 'exists') return 'has(response.headers[' + JSON.stringify(a.name || '') + '])';
      if (a.op === 'contains') return hk + '.contains(' + celVal(a.exp) + ')';
      return hk + ' == ' + celVal(a.exp);
    }
    case 'json': {
      const acc = pathToCEL(a.path);
      if (a.op === 'exists') return 'has(' + acc + ')';
      if (a.op === 'gt') return acc + ' > ' + celVal(a.exp);
      if (a.op === 'lengthGt') return 'size(' + acc + ') > ' + celVal(a.exp);
      return acc + ' == ' + celVal(a.exp);
    }
    case 'text':
      return (a.op === 'notcontains' ? '!' : '') + 'response.text.contains(' + celVal(a.exp) + ')';
    case 'timing':
      return 'response.time < ' + (a.exp || '2000');
    case 'forall':
      return pathToCEL(a.path) + '.all(i, i.' + (a.field || 'value') + ' ' + (a.sub || '>') + ' ' + celVal(a.exp) + ')';
    case 'exists':
      return pathToCEL(a.path) + '.exists(i, i.' + (a.field || 'value') + ' ' + (a.sub || '==') + ' ' + celVal(a.exp) + ')';
    case 'count':
      return 'size(' + pathToCEL(a.path) + ') ' + (a.op || '==') + ' ' + (a.exp || '0');
    case 'script': return null;
  }
  return '';
}
function assertionsToCEL(t) {
  const preds = t.assertions.filter(a => a.type !== 'script').map(toCEL).filter(Boolean);
  return preds.length ? preds.join(' &&\n') : '// no compilable assertions';
}
function toScriptLine(a) {
  const E = x => 'relay.expect(' + x + ')';
  switch (a.type) {
    case 'status':
      if (a.op === 'is2xx') return E('response.status') + '.toBeLevel2xx();';
      if (a.op === 'oneof') return E('response.status') + '.toBeOneOf(' + celList(a.exp) + ');';
      return E('response.status') + '.toEqual(' + (a.exp || '200') + ');';
    case 'header': {
      const hk = 'response.headers[' + JSON.stringify(a.name || '') + ']';
      if (a.op === 'exists') return E(hk) + '.toBeDefined();';
      if (a.op === 'contains') return E(hk) + '.toContain(' + celVal(a.exp) + ');';
      return E(hk) + '.toEqual(' + celVal(a.exp) + ');';
    }
    case 'json': {
      const acc = pathToCEL(a.path);
      if (a.op === 'exists') return E(acc) + '.toBeDefined();';
      if (a.op === 'gt') return E(acc) + '.toBeGreaterThan(' + celVal(a.exp) + ');';
      if (a.op === 'lengthGt') return E(acc + '.length') + '.toBeGreaterThan(' + celVal(a.exp) + ');';
      return E(acc) + '.toEqual(' + celVal(a.exp) + ');';
    }
    case 'text':
      return E('response.text') + (a.op === 'notcontains' ? '.not' : '') + '.toContain(' + celVal(a.exp) + ');';
    case 'timing':
      return E('response.time') + '.toBeLessThan(' + (a.exp || '2000') + ');';
    case 'forall':
      return E(pathToCEL(a.path) + '.every(i => i.' + (a.field || 'value') + ' ' + (a.sub || '>') + ' ' + celVal(a.exp) + ')') + '.toBe(true);';
    case 'exists':
      return E(pathToCEL(a.path) + '.some(i => i.' + (a.field || 'value') + ' ' + (a.sub || '==') + ' ' + celVal(a.exp) + ')') + '.toBe(true);';
    case 'count':
      return E(pathToCEL(a.path) + '.length') + '.toBe' + (a.op === '>' ? 'GreaterThan' : a.op === '<' ? 'LessThan' : '') + '(' + (a.exp || '0') + ');';
  }
  return '';
}
function assertionsToScript(t) {
  const lines = t.assertions.filter(a => a.type !== 'script' && a.type).map(a => '  ' + toScriptLine(a));
  const custom = t.assertions.filter(a => a.type === 'script' && a.code)
    .map(a => '  ' + a.code.trim().split('\n').join('\n  '));
  return 'relay.test(' + JSON.stringify(t.name) + ', () => {\n' +
    lines.join('\n') + (custom.length ? '\n  // — advanced (escape hatch) —\n' + custom.join('\n') : '') +
    '\n});';
}
// CEL syntax highlighter
function hlCEL(s) {
  s = escHtml(s);
  s = s.replace(/(^|\n)(\s*\/\/[^\n]*)/g, '$1<span class="tok-kw">$2</span>');
  s = s.replace(/\b(response|request|i)\b(?=\.|\b)/g, '<span class="tok-obj">$1</span>');
  s = s.replace(/\b(all|exists|exists_one|filter|map|has|size|in)\b/g, '<span class="tok-mac">$1</span>');
  s = s.replace(/&quot;([^&]*?)&quot;/g, '<span class="tok-str">&quot;$1&quot;</span>');
  s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="tok-num">$1</span>');
  return s;
}

function visibleTests() {
  return SUITE.tests.filter(t => {
    if (searchTerm && !(t.name.toLowerCase().includes(searchTerm) ||
        t.path.toLowerCase().includes(searchTerm) ||
        (t.xray && t.xray.toLowerCase().includes(searchTerm)))) return false;
    for (const f of activeFilters) {

  const menu = h('div', { style:'position:fixed;z-index:9999;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:4px;min-width:170px;box-shadow:0 8px 24px rgba(0,0,0,.12)' });
  const defaults = {
    status:{type:'status',op:'equals',exp:'200',res:null},
    header:{type:'header',name:'Content-Type',op:'contains',exp:'application/json',res:null},
    json:{type:'json',path:'$.',op:'equals',exp:'',res:null},
    text:{type:'text',op:'contains',exp:'',res:null},
    timing:{type:'timing',metric:'total',op:'<',exp:'2000',res:null},
    forall:{type:'forall',path:'$.checks',field:'passed',sub:'==',exp:'true',res:null},
    exists:{type:'exists',path:'$.matches',field:'confidence',sub:'>',exp:'0.8',res:null},
    count:{type:'count',path:'$.matches',op:'==',exp:'0',res:null},
    script:{type:'script',code:'',res:null},
  };
  for (const [val,lbl] of types) {
    menu.append(h('button', { class:'navItem', style:'color:var(--fg);padding:7px 12px',
      onclick:()=>{ t.assertions.push({...defaults[val]}); if(menu.parentNode) document.body.removeChild(menu); renderMain(); } },
      h('span', { class:'asrtType '+val, style:'margin-right:8px' }, TYPE_LABEL[val] || lbl)));
  }
  document.body.append(menu);
  const btn = event.currentTarget.getBoundingClientRect();
  menu.style.left = btn.left + 'px';
  menu.style.top = (btn.top - menu.offsetHeight - 6) + 'px';
  setTimeout(()=>document.addEventListener('click', function close(e){
    if (!menu.contains(e.target)) { if (menu.parentNode) document.body.removeChild(menu); document.removeEventListener('click', close); }
  }), 0);
}

/* --- clickable response tree → assertion authoring --- */
function jsonType(v) {
  if (v === null) return 'null';
  if (Array.isArray(v)) return 'array';
  return typeof v === 'object' ? 'object' : typeof v;
}
function valClass(v) {
  const tp = jsonType(v);
  return tp === 'string' ? 'str' : (tp === 'number' ? 'num' : (tp === 'boolean' ? 'bool' : 'null'));
}
function valText(v) { return jsonType(v) === 'string' ? JSON.stringify(v) : String(v); }

function openAssertFromResponse(t) {
  let added = 0;
  openModal({
    title:'Assert from response', wide:true,
    subtitle: t.method + ' ' + SUITE.baseUrl + t.path + (t.run ? '  ·  ' + t.run.code + ' · ' + t.run.ms + 'ms' : '  ·  sample'),
    build(body) {
      body.append(h('div', { class:'fhint', style:'margin-bottom:10px', html:
        'Click any value to add an equality assertion on its <span class="mono">$</span>JSONPath. Arrays offer <b>∀ for-all</b> and <b>count</b>. Each compiles to CEL.' }));
      const tree = h('div', { class:'jtree', role:'tree' });
      renderJsonNode(tree, sampleFor(t), '$', 0, t, () => { added++; const c = $('__addedCount'); if (c) c.textContent = added + ' added'; });
      body.append(tree);
    },
    actions(foot) {
      foot.append(h('span', { id:'__addedCount', style:'font-size:12px;color:var(--green);font-weight:600' }, ''),
        h('span', { class:'grow' }),
        h('button', { class:'btn dark', onclick:()=>{ closeModal(); if (added) toast('Added ' + added + ' assertion' + (added===1?'':'s')); } }, 'Done'));
    },
  });
}
function addFromTree(t, a, onAdd) {
  t.assertions.push(a); onAdd();
  // keep modal open; refresh the underlying editor live
  const work = $('work'); const sc = work ? work.scrollTop : 0;
  renderMain(); if (work) work.scrollTop = sc;
}
function renderJsonNode(parent, val, path, depth, t, onAdd) {
  const pad = (depth * 16 + 2) + 'px';
  const tp = jsonType(val);
  if (tp === 'object' || tp === 'array') {
    const entries = tp === 'array' ? val.map((v, i) => [i, v]) : Object.entries(val);
    const isArr = tp === 'array';
    const headRow = h('div', { class:'jrow', style:'padding-left:'+pad },
      path === '$'
        ? h('span', { class:'jkey' }, '$')
        : h('span', { class:'jkey' }, lastSeg(path)),
      h('span', { class:'jpunct' }, isArr ? '[' : '{'),
      h('span', { class:'jcount' }, entries.length + (isArr ? ' item'+(entries.length===1?'':'s') : ' key'+(entries.length===1?'':'s'))));
    if (isArr) {
      headRow.append(
        h('button', { class:'jtool', title:'Assert every item: '+path+'.all(i, …)',
          onclick:()=>{ const field = guessField(val); addFromTree(t,
            { type:'forall', path, field, sub:'==', exp: field==='passed'?'true':'', res:null }, onAdd); } }, '∀ for-all'),
        h('button', { class:'jtool', title:'Assert item count',
          onclick:()=>addFromTree(t, { type:'count', path, op:'==', exp:String(entries.length), res:null }, onAdd) }, 'count'),
        h('button', { class:'jtool', title:'Assert non-empty',
          onclick:()=>addFromTree(t, { type:'count', path, op:'>', exp:'0', res:null }, onAdd) }, 'non-empty'));
    }
    parent.append(headRow);
    for (const [k, v] of entries) {
      const childPath = isArr ? path + '[' + k + ']' : path + '.' + k;
      renderJsonNode(parent, v, childPath, depth + 1, t, onAdd);
    }
    parent.append(h('div', { class:'jrow', style:'padding-left:'+pad },
      h('span', { class:'jpunct' }, isArr ? ']' : '}')));
  } else {
    const row = h('div', { class:'jrow', style:'padding-left:'+pad },
      h('span', { class:'jkey' }, lastSeg(path)), h('span', { class:'jpunct' }, ':'),
      h('span', { class:'jval ' + valClass(val), role:'button', tabindex:'0',
        title:'Add assertion: ' + pathToCEL(path) + ' == ' + celVal(valText(val).replace(/^"|"$/g,'')),
        onclick:()=>addFromTree(t, { type:'json', path, op:'equals',
          exp: tp === 'string' ? val : String(val), res:null }, onAdd),
        onkeydown:(e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); e.currentTarget.click(); } },
      }, valText(val)));
    if (tp === 'number') row.append(
      h('button', { class:'jtool', title:'Assert greater-than',
        onclick:()=>addFromTree(t, { type:'json', path, op:'gt', exp:String(val), res:null }, onAdd) }, '>'));
    parent.append(row);
  }
}
function lastSeg(p) { const m = String(p).match(/(?:\.([\w$]+)|\[(\d+)\])$/); return m ? (m[1] || ('['+m[2]+']')) : p; }
function guessField(arr) {
  const o = arr.find(x => x && typeof x === 'object');
  if (!o) return 'value';
  if ('passed' in o) return 'passed';
  if ('confidence' in o) return 'confidence';
  return Object.keys(o)[0] || 'value';
}

/* ---------------- meta rail: run & push ---------------- */
function scopeCount() {
  const t = getTest(selectedId);
  let base;
  if (runScope === 'selected') base = [t];
  else if (runScope === 'folder') base = SUITE.tests.filter(x=>x.enabled);
  else base = SUITE.tests.filter(x=>x.enabled);
  // tag expression: tag=regression,!flaky
  if (tagExpr.trim()) {
    const terms = tagExpr.replace(/^tag=/,'').split(',').map(s=>s.trim()).filter(Boolean);
    base = base.filter(x => terms.every(term => {
      if (term.startsWith('!')) return !x.tags.includes(term.slice(1));
      return x.tags.includes(term);
    }));
  }
  return base;
}
function renderMeta() {
  const t = getTest(selectedId);
  const meta = $('meta'); meta.innerHTML = '';

function renderPushBody(t, result) {
  const body = $('pushBody'); body.innerHTML = '';
  if (result) {
    body.append(h('div', { style:'margin-bottom:6px' },
      h('span', { class:'lbl', style:'margin-bottom:4px' }, 'Execution'),
      h('span', { class:'execKey' }, result.exec)));
    body.append(h('div', { style:'font-size:10.5px;color:var(--dim);margin-bottom:8px' },
      'linked to plan ', h('span', { class:'mono', style:'color:var(--ink)' }, XRAY_CFG.plan),
      ' · set ', h('span', { class:'mono', style:'color:var(--ink)' }, XRAY_CFG.testSet)));
    for (const r of result.rows) {
      const map = { pushed:['ok','✓','pushed'], created:['ok','✓','created + pushed'], skip:['neutral','–','skipped (no key)'] };
      const [cls,ic,lbl] = map[r.status];
      body.append(h('div', { class:'pushStat' },
        h('span', { class:'ic '+(cls==='neutral'?'':cls), style:cls==='neutral'?'color:var(--faint)':'' }, ic),
        h('span', { style:'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap' }, r.name),
        h('span', { class:'maptag '+(r.status==='skip'?'skip':r.status==='created'?'create':'link') }, lbl)));
    }
    body.append(h('button', { class:'btn sm full', style:'margin-top:8px', onclick:()=>{ pushPreviewed=false; renderPushBody(getTest(selectedId)); } }, 'Done'));
    return;
  }
  if (!pushPreviewed) {
    body.append(h('div', { style:'font-size:11px;color:var(--dim);margin-bottom:8px' },
      'Preview the test → Xray key mapping before pushing.'),
      h('button', { class:'btn sm full', onclick:()=>{ pushPreviewed=true; renderPushBody(getTest(selectedId)); } }, 'Preview mapping'));
    return;
  }
  // dry-run mapping preview
  const tests = scopeCount();
  // execution target
  const tgt = h('div', { style:'border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:10px' });
  tgt.append(h('div', { style:'font-size:10px;letter-spacing:.06em;color:var(--faint);text-transform:uppercase;font-weight:700;margin-bottom:6px' }, 'Execution target'));
  tgt.append(segGroup([['new','New execution'],['existing','Existing']], pushExec.mode, (v)=>{ pushExec.mode=v; renderPushBody(getTest(selectedId)); }, true));
  if (pushExec.mode === 'existing') tgt.append(h('input', { type:'text', class:'tagExpr', value:pushExec.key, placeholder:'AML-E####', 'aria-label':'Existing execution key', oninput:(e)=>pushExec.key=e.target.value.trim().toUpperCase() }));
  tgt.append(h('div', { style:'font-size:10.5px;color:var(--dim);margin-top:7px' }, 'plan ', h('span',{class:'mono',style:'color:var(--ink)'},XRAY_CFG.plan), ' · set ', h('span',{class:'mono',style:'color:var(--ink)'},XRAY_CFG.testSet)));
  body.append(tgt);
  const mapping = tests.map(x => ({
    name:x.name,
    status: x.xray ? 'link' : (x.assertions.length ? 'create' : 'skip'),
    key: x.xray || (x.assertions.length ? 'auto' : '—'),
  }));
  const counts = { link:0, create:0, skip:0 };
  mapping.forEach(m=>counts[m.status]++);
  body.append(h('div', { style:'font-size:10px;letter-spacing:.06em;color:var(--faint);text-transform:uppercase;font-weight:700;margin-bottom:6px' }, 'Dry-run mapping'));
  for (const m of mapping) {
    body.append(h('div', { class:'mapRow' },
      h('span', { class:'nm', title:m.name }, m.name),
      h('span', { class:'key' }, m.key),
      h('span', { class:'maptag '+m.status }, m.status)));
  }
  body.append(h('div', { style:'font-size:10.5px;color:var(--dim);margin:8px 0' },
    counts.link+' link · '+counts.create+' create · '+counts.skip+' skip'));
  body.append(h('button', { class:'btn dark full', onclick:()=>doPush(mapping) }, 'Push execution'));
}

let running = false;
function doRun() {
  if (running) return; running = true;
  const btn = $('runBtn'); const n = scopeCount().length;
  if (btn) { btn.innerHTML=''; btn.append(h('span',{class:'spin'}),'Running '+n+'…'); btn.disabled = true; }
  setTimeout(()=>{
    running = false;
    if (btn) { btn.innerHTML='▷ Run'; btn.disabled = false; }
    // re-stamp run timestamps so "last run" reads fresh
    scopeCount().forEach(x=>{ if(x.run) x.run.at = '2026-06-19 09:48'; });
    toast('Ran '+n+' test'+(n===1?'':'s')+' · '+scopeCount().filter(x=>!x.run||x.run.status!=='fail').length+' passed');
    renderTree(); renderMain();
  }, 1300);
}
function doPush(mapping) {
  const body = $('pushBody');
  body.innerHTML=''; body.append(h('div',{class:'pushStat'},h('span',{class:'spin',style:'border-color:rgba(40,40,122,.25);border-top-color:var(--ink)'}),'Pushing to Xray…'));
  setTimeout(()=>{
    const exec = pushExec.mode === 'existing' && pushExec.key ? pushExec.key : 'AML-E' + (2000 + rid(900));
    pushExec.key = exec;
    const rows = mapping.map(m=>({ name:m.name, status: m.status==='skip'?'skip':(m.status==='create'?'created':'pushed') }));
    renderPushBody(getTest(selectedId), { exec, rows });
    $('sbXray').textContent = 'xray: pushed → ' + exec;
    toast('Pushed execution ' + exec + ' → plan ' + XRAY_CFG.plan);
  }, 1400);
}

/* ---------------- New Test creation ---------------- */
function openNewTest() {
  const draft = { name:'', method:'POST', path:'/aml/v2/', owner:'risk-platform', priority:'med',
    tags:'', starter:true, linkXray:false, xrayKey:'' };
  openModal({
    title:'New test', subtitle:'Adds a Relay test under AML / verify',
    build(body) {
      body.append(frow('Test name',
        h('input', { type:'text', placeholder:'Verify Individual', oninput:(e)=>draft.name=e.target.value }),
        'Becomes the test id <span class="mono">relay-&lt;slug&gt;</span> and source file.'));
      const methodSel = h('select', {}, ...['GET','POST','PUT','PATCH','DELETE','HEAD','OPTIONS'].map(m=>{
        const o=h('option',{value:m},m); if(m===draft.method)o.selected=true; return o; }));
      methodSel.onchange = e=>draft.method=e.target.value;
      body.append(h('div', { class:'frow two' },
        frow('Method', methodSel),
        frow('Collection / folder', h('select', {}, h('option',{},'AML / verify')))));
      body.append(frow('Endpoint',
        h('input', { type:'text', class:'mono', value:draft.path, oninput:(e)=>draft.path=e.target.value }),
        'Prefixed with <span class="mono">{{baseUrl}}</span> at run time.'));
      const prioSel = h('select', {}, ...[['low','Low'],['med','Medium'],['high','High']].map(([v,l])=>{
        const o=h('option',{value:v},l); if(v===draft.priority)o.selected=true; return o; }));
      prioSel.onchange = e=>draft.priority=e.target.value;
      body.append(h('div', { class:'frow two' },
        frow('Owner / component', h('input', { type:'text', class:'mono', value:draft.owner, oninput:(e)=>draft.owner=e.target.value })),
        frow('Priority', prioSel)));
      body.append(frow('Tags', h('input', { type:'text', class:'mono', placeholder:'smoke, regression', oninput:(e)=>draft.tags=e.target.value }),
        'Comma separated.'));
      body.append(h('label', { class:'ckbtn' },
        h('input', { type:'checkbox', checked:draft.starter, onchange:(e)=>draft.starter=e.target.checked }),
        'Seed starter assertions (status is 2xx · $.result.status equals VERIFIED)'));
      const keyWrap = h('div', { style:'margin-top:8px;display:none' },
        h('input', { type:'text', class:'mono', placeholder:'AML-T142', style:'width:100%', oninput:(e)=>draft.xrayKey=e.target.value }));
      body.append(h('label', { class:'ckbtn' },
        h('input', { type:'checkbox', onchange:(e)=>{ draft.linkXray=e.target.checked; keyWrap.style.display=e.target.checked?'block':'none'; } }),
        'Link an existing Xray test now'), keyWrap);
    },
    actions(foot) {
      foot.append(h('button', { class:'btn', onclick:closeModal }, 'Cancel'),
        h('button', { class:'btn dark', onclick:()=>{
          if (!draft.name.trim()) { toast('Enter a test name', true); return; }
          const key = draft.linkXray ? draft.xrayKey.trim().toUpperCase() : '';
          if (key) XRAY_EXISTING.add(key);
          const t = {
            id:'relay-'+(slug(draft.name)||'test-'+rid()), name:draft.name.trim(), method:draft.method,
            path:draft.path.trim(), enabled:true, owner:draft.owner.trim()||'unassigned', priority:draft.priority,
            src:'collections/aml/'+(slug(draft.name)||'test')+'.req.toml',
            tags:draft.tags.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean),
            xray:key, reqs:[], plan:'', set:'',
            assertions: draft.starter ? [
              { type:'status', op:'is2xx', exp:'2xx', res:null, desc:'HTTP status is 2xx' },
              { type:'json', path:'$.result.status', op:'equals', exp:'VERIFIED', res:null, desc:'$.result.status equals VERIFIED' },
            ] : [],
            run:null,
          };
          SUITE.tests.push(t); closeModal(); select(t.id); toast('Created test ' + t.name);
        } }, 'Create test'));
    },
  });
}

/* ---------------- Export modal ---------------- */
function buildExport(fmt, opts) {
  let tests = scopeCount();
  if (!opts.passed) tests = tests.filter(t => !(t.run && t.run.status === 'pass'));
  const verdict = t => !t.run ? 'untested' : (t.run.status === 'fail' ? 'failed' : 'passed');
  if (fmt === 'cel') return buildCelYaml(tests);
  if (fmt === 'junit') {
    const fails = tests.reduce((n,t)=> n + (t.run && t.run.status==='fail' ? 1 : 0), 0);
    let x = '<?xml version="1.0" encoding="UTF-8"?>\n';
    x += `<testsuite name="AML / verify" tests="${tests.length}" failures="${fails}" timestamp="2026-06-19T09:48:00">\n`;
    for (const t of tests) {
      const ms = t.run ? (t.run.ms/1000).toFixed(3) : '0';
      x += `  <testcase classname="${t.xray||t.id}" name="${t.name}" time="${ms}">\n`;
      for (const a of t.assertions) if (a.res === 'bad')
        x += `    <failure message="${(a.err||a.desc).replace(/"/g,'&quot;')}">${a.desc}</failure>\n`;
      if (!t.run) x += `    <skipped/>\n`;
      x += `  </testcase>\n`;
    }
    return x + '</testsuite>\n';
  }
  if (fmt === 'json') {
    return JSON.stringify(tests.map(t => ({
      id:t.id, name:t.name, method:t.method, endpoint:'{{baseUrl}}'+t.path, xrayTest:t.xray||null,
      result: verdict(t), http:t.run?t.run.code:null, durationMs:t.run?t.run.ms:null, env:t.run?t.run.env:null,
      assertions: t.assertions.map(a => ({ type:a.type, condition:a.desc, status: a.res==='ok'?'pass':a.res==='bad'?'fail':'not-run',
        ...(opts.diagnostics && a.err ? { message:a.err } : {}) })),
    })), null, 2);
  }
  // xray cloud import format
  return JSON.stringify({
    testExecutionKey: pushExec.mode==='existing' && pushExec.key ? pushExec.key : null,
    info: { summary:'AML verify regression run', project:XRAY_CFG.project, testPlanKey:XRAY_CFG.plan,
            testEnvironments:[ (getTest(selectedId).run||{}).env || 'Staging' ] },
    tests: tests.map(t => ({
      testKey: t.xray || undefined,
      status: !t.run ? 'TODO' : (t.run.status==='fail' ? 'FAILED' : 'PASSED'),
      comment: opts.diagnostics ? t.assertions.filter(a=>a.res==='bad').map(a=>a.err).join('; ') || undefined : undefined,
    })),
  }, null, 2);
}
function buildCelYaml(tests) {
  let y = '# Relay test suite — AML / verify\n# Visual assertions compiled to CEL, stored as diffable YAML\nsuite: AML / verify\ntests:\n';
  for (const t of tests) {
    y += '  - id: ' + t.id + '\n';
    y += '    name: ' + JSON.stringify(t.name) + '\n';
    y += '    request: ' + t.method + ' {{baseUrl}}' + t.path + '\n';
    if (t.xray) y += '    xray: ' + t.xray + '\n';
    if (t.tags.length) y += '    tags: [' + t.tags.join(', ') + ']\n';
    const preds = t.assertions.filter(a => a.type !== 'script').map(toCEL).filter(Boolean);
    y += '    assert:\n';
    if (preds.length) preds.forEach(p => { y += '      - ' + p.replace(/\n/g, ' ') + '\n'; });
    else y += '      []\n';
    const scripts = t.assertions.filter(a => a.type === 'script' && a.code);
    if (scripts.length) { y += '    script: |\n'; scripts.forEach(s => s.code.trim().split('\n').forEach(l => y += '      ' + l + '\n')); }
  }
  return y;
}
function openExport(initial) {
  const state = { fmt: initial || 'junit', passed:true, diagnostics:true };
  openModal({
    title:'Export results', subtitle:'Scope: '+scopeCount().length+' test'+(scopeCount().length===1?'':'s')+' ('+runScope+')', wide:true,
    build(body, box) {
      const render = () => { const p = box.querySelector('#expPrev'); if (p) p.textContent = buildExport(state.fmt, state); };
      body.append(frow('Format', segGroup([['junit','JUnit XML'],['json','Relay JSON'],['xray','Xray JSON'],['cel','CEL · YAML']], state.fmt,
        (v)=>{ state.fmt=v; render(); }, true)));
      body.append(h('label', { class:'ckbtn' }, h('input', { type:'checkbox', checked:state.passed,
        onchange:(e)=>{ state.passed=e.target.checked; render(); } }), 'Include passing tests'));
      body.append(h('label', { class:'ckbtn' }, h('input', { type:'checkbox', checked:state.diagnostics,
        onchange:(e)=>{ state.diagnostics=e.target.checked; render(); } }), 'Include failure diagnostics'));
      body.append(h('div', { class:'flbl', style:'margin-top:12px' }, 'Preview'));
      body.append(h('pre', { id:'expPrev', class:'codePrev' }, buildExport(state.fmt, state)));
    },
    actions(foot, box) {
      const ext = { junit:'xml', json:'json', xray:'json', cel:'yaml' }, type = { junit:'application/xml', json:'application/json', xray:'application/json', cel:'text/yaml' };
      foot.append(h('button', { class:'btn', onclick:()=>{
        navigator.clipboard && navigator.clipboard.writeText(box.querySelector('#expPrev').textContent);
        toast('Copied to clipboard'); } }, 'Copy'),
        h('button', { class:'btn dark', onclick:()=>{
          const name = 'aml-verify.' + ({junit:'junit.xml', json:'results.json', xray:'xray.json', cel:'suite.yaml'})[state.fmt];
          download(name, box.querySelector('#expPrev').textContent, type[state.fmt]);
          toast('Downloaded ' + name); closeModal(); } }, 'Download'));
    },
  });
}

/* ---------------- Xray / Jira connection config ---------------- */
function openXrayConfig() {
  const d = { ...XRAY_CFG };
  openModal({
    title:'Xray / Jira connection', subtitle:'Credentials are stored locally in Relay', wide:true,
    build(body, box) {
      body.append(h('div', { class:'fsec' }, 'Jira'));
      body.append(frow('Jira base URL', h('input', { type:'text', class:'mono', value:d.jiraUrl, oninput:(e)=>d.jiraUrl=e.target.value }),
        'e.g. <span class="mono">https://your-org.atlassian.net</span>'));
      body.append(h('div', { class:'frow two' },
        frow('Account email', h('input', { type:'email', class:'mono', value:d.email, oninput:(e)=>d.email=e.target.value })),
        frow('Jira API token', h('input', { type:'password', class:'mono', value:d.apiToken, placeholder:'••••••••', oninput:(e)=>d.apiToken=e.target.value }))));

      body.append(h('div', { class:'fsec' }, 'Xray authentication'));
      body.append(frow('Deployment', segGroup([['cloud','Xray Cloud (client id / secret)'],['server','Server / DC (API key)']],
        d.auth, (v)=>{ d.auth=v; renderAuth(); }, true)));
      const authBox = h('div'); body.append(authBox);
      function renderAuth() {
        authBox.innerHTML = '';
        if (d.auth === 'cloud') {
          authBox.append(h('div', { class:'frow two' },
            frow('Client ID', h('input', { type:'text', class:'mono', value:d.clientId, oninput:(e)=>d.clientId=e.target.value })),
            frow('Client secret', h('input', { type:'password', class:'mono', value:d.clientSecret, placeholder:'••••••••', oninput:(e)=>d.clientSecret=e.target.value }))));
        } else {
          authBox.append(frow('Xray API key', h('input', { type:'password', class:'mono', value:d.apiKey, placeholder:'••••••••', oninput:(e)=>d.apiKey=e.target.value }),
            'Personal access token from your Xray Server / Data Center instance.'));
        }
      }
      renderAuth();

      body.append(h('div', { class:'fsec' }, 'Defaults for new issues'));
      body.append(h('div', { class:'frow three' },
        frow('Project key', h('input', { type:'text', class:'mono', value:d.project, oninput:(e)=>d.project=e.target.value })),
        frow('Test plan', h('input', { type:'text', class:'mono', value:d.plan, oninput:(e)=>d.plan=e.target.value })),
        frow('Test set', h('input', { type:'text', class:'mono', value:d.testSet, oninput:(e)=>d.testSet=e.target.value }))));
      body.append(h('div', { class:'fhint' }, 'New Test, Test Set, Test Execution and Test Plan issues are created in this project and linked automatically.'));
      body.append(h('div', { id:'connSlot', style:'margin-top:14px' },
        h('span', { class:'connLine '+(XRAY_CFG.connected?'ok':'idle') }, h('span',{class:'d'}),
          XRAY_CFG.connected ? 'Connected · Xray Cloud · project '+XRAY_CFG.project : 'Not connected')));
    },
    actions(foot, box) {
      foot.append(h('button', { class:'btn', onclick:()=>{
        const slot = box.querySelector('#connSlot'); slot.innerHTML='';
        slot.append(h('span',{class:'connLine idle'},h('span',{class:'d'}),'Testing connection…'));
        const ok = d.jiraUrl.trim() && d.email.trim() && (d.auth==='cloud' ? d.clientId.trim() : d.apiKey.trim());
        setTimeout(()=>{ slot.innerHTML='';
          slot.append(h('span',{class:'connLine '+(ok?'ok':'bad')},h('span',{class:'d'}),
            ok ? 'Connected · '+(d.auth==='cloud'?'Xray Cloud':'Xray Server')+' · project '+(d.project||'—') : 'Missing required credentials'));
        }, 850);
      } }, 'Test connection'),
        h('span', { class:'grow' }),
        h('button', { class:'btn', onclick:closeModal }, 'Cancel'),
        h('button', { class:'btn dark', onclick:()=>{
          if (!d.jiraUrl.trim() || !d.email.trim()) { toast('Jira URL and email are required', true); return; }
          Object.assign(XRAY_CFG, d, { connected:true });
          updateXrayStatus(); closeModal(); renderMain(); renderMeta(); toast('Saved Xray connection');
        } }, 'Save connection'));
    },
  });
}
function updateXrayStatus() {
  $('sbXray').textContent = 'xray: ' + (XRAY_CFG.connected ? 'connected ('+XRAY_CFG.project+')' : 'not connected');
}

/* ---------------- Create Xray issue (Test / Set / Execution / Plan) ---------------- */
function openCreateIssue(t) {
  const d = { type:'Test', summary:t.name, addThis:true };
  openModal({
    title:'Create Xray issue', subtitle:'In project '+XRAY_CFG.project+' · '+(XRAY_CFG.connected?'connected':'not connected'),
    build(body) {
      body.append(frow('Issue type', segGroup([['Test','Test'],['Test Set','Test Set'],['Test Execution','Test Execution'],['Test Plan','Test Plan']],
        d.type, (v)=>{ d.type=v; const c=document.getElementById('linkThisRow'); if(c) c.style.display = v==='Test' ? 'none' : 'flex'; }, true)));
      body.append(frow('Summary', h('input', { type:'text', value:d.summary, oninput:(e)=>d.summary=e.target.value }),
        d.type==='Test' ? 'Assertions on this test become Xray test steps.' : ''));
      body.append(h('label', { id:'linkThisRow', class:'ckbtn', style:'display:none' },
        h('input', { type:'checkbox', checked:d.addThis, onchange:(e)=>d.addThis=e.target.checked }),
        'Add "'+t.name+'" to the new issue'));
      body.append(h('div', { class:'fhint' }, 'Created via the Xray GraphQL API and linked to this Relay test. Configure the connection from the Push panel.'));
    },
    actions(foot) {
      foot.append(h('button', { class:'btn', onclick:closeModal }, 'Cancel'),
        h('button', { class:'btn dark', onclick:()=>{ createIssue(t, d.type, d.summary, d.addThis); closeModal(); } }, 'Create issue'));
    },
  });
}
function createIssue(t, type, summary, addThis) {
  const pre = { 'Test':'T', 'Test Set':'S', 'Test Execution':'E', 'Test Plan':'P' }[type];
  const key = XRAY_CFG.project + '-' + pre + rid(900);
  if (type === 'Test') { XRAY_EXISTING.add(key); t.xray = key; }
  else if (type === 'Test Set') { if (addThis) t.set = key; }
  else if (type === 'Test Plan') { if (addThis) t.plan = key; }
  else if (type === 'Test Execution') { pushExec.mode='existing'; pushExec.key = key; }
  toast('Created ' + type + ' ' + key + (addThis && type!=='Test' ? ' · linked '+t.name : ''));
  renderTree(); renderMain(); renderMeta();
}

/* ---------------- wiring ---------------- */
$('sideSearch').addEventListener('input', (e)=>{ searchTerm = e.target.value.toLowerCase().trim(); renderTree(); });
$('newTestBtn').onclick = openNewTest;
$('dupBtn').onclick = ()=>{ const t=getTest(selectedId); const c={...t, id:t.id+'-copy', name:t.name+' (copy)', assertions:t.assertions.map(a=>({...a})), tags:[...t.tags], reqs:[...t.reqs], run:null}; SUITE.tests.push(c); select(c.id); toast('Duplicated test'); };
$('perReqBtn').onclick = ()=>toast('Opening '+getTest(selectedId).name+' in request editor → assertions tab');
$('sbXray').style.cursor = 'pointer';
$('sbXray').title = 'Configure Xray connection';
$('sbXray').onclick = openXrayConfig;
document.querySelectorAll('.navItem:not([disabled])').forEach(b=>{
  b.addEventListener('click', ()=>{
    if (b.dataset.view === 'tests') return;
    if (b.dataset.view === 'settings') { openXrayConfig(); return; }
    toast(b.textContent.trim()+' — switch view (mock)');
  });
});

updateXrayStatus();
renderFilters(); renderTree(); renderMain(); renderMeta();
