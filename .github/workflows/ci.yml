name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install webview dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Desktop build tags
        id: tags
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            echo "tags=desktop,production,webkit2_41" >> "$GITHUB_OUTPUT"
          else
            echo "tags=desktop,production" >> "$GITHUB_OUTPUT"
          fi
      - run: go vet -tags ${{ steps.tags.outputs.tags }} ./...
      - run: go test ./...
      - name: Build CLI
        run: go build -ldflags="-s -w" -o relay${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/relay
      - name: Build desktop app
        run: go build -tags ${{ steps.tags.outputs.tags }} -ldflags="-s -w" -o relay-app${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/relay-app
