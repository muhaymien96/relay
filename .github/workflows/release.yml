name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: relay-linux-amd64
            tags: desktop,production,webkit2_41
          - os: macos-latest
            artifact: relay-macos-arm64
            tags: desktop,production
          - os: windows-latest
            artifact: relay-windows-amd64
            tags: desktop,production
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install webview dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        shell: bash
        run: |
          EXT=""
          GUIFLAGS=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXT=".exe"
            GUIFLAGS="-H windowsgui"
          fi
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/relay$EXT" ./cmd/relay
          go build -trimpath -tags "${{ matrix.tags }}" -ldflags "-s -w $GUIFLAGS" -o "dist/relay-app$EXT" ./cmd/relay-app

      # Authenticode signing runs only when a certificate is configured:
      #   WINDOWS_CERT_PFX_BASE64  base64 of the .pfx
      #   WINDOWS_CERT_PASSWORD    its password
      # An EV certificate (or Azure Trusted Signing) gives immediate
      # SmartScreen reputation; an OV certificate builds it over downloads.
      - name: Sign Windows binaries
        if: runner.os == 'Windows' && env.CERT != ''
        env:
          CERT: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:CERT))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1
          & $signtool sign /f cert.pfx /p $env:CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 dist\relay.exe dist\relay-app.exe
          Remove-Item cert.pfx

      - name: Package
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "../${{ matrix.artifact }}.zip" relay.exe relay-app.exe
          else
            zip "../${{ matrix.artifact }}.zip" relay relay-app
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Checksums
        run: sha256sum *.zip > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            SHA256SUMS.txt
          generate_release_notes: true
