document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:'key' }, m.key),\n      h('span', { class:'maptag '+m.status }, m.status)));\n  }\n  body.append(h('div', { style:'font-size:10.5px;color:var(--dim);margin:8px 0' },\n    counts.link+' link · '+counts.create+' create · '+counts.skip+' skip'));\n  body.append(h('button', { class:'btn dark full', onclick:()=>doPush(mapping) }, 'Push execution'));\n}\n\nlet running = false;\nfunction doRun() {\n  if (running) return; running = true;\n  const btn = $('runBtn'); const n = scopeCount().length;\n  if (btn) { btn.innerHTML=''; btn.append(h('span',{class:'spin'}),'Running '+n+'…'); btn.disabled = true; }\n  setTimeout(()=>{\n    running = false;\n    if (btn) { btn.innerHTML='▷ Run'; btn.disabled = false; }\n    // re-stamp run timestamps so \"last run\" reads fresh\n    scopeCount().forEach(x=>{ if(x.run) x.run.at = '2026-06-19 09:48'; });\n    toast('Ran '+n+' test'+(n===1?'':'s')+' · '+scopeCount().filter(x=>!x.run||x.run.status!=='fail').length+' passed');\n    renderTree(); renderMain();\n  }, 1300);\n}\nfunction doPush(mapping) {\n  const body = $('pushBody');\n  body.innerHTML=''; body.append(h('div',{class:'pushStat'},h('span',{class:'spin',style:'border-color:rgba(40,40,122,.25);border-top-color:var(--ink)'}),'Pushing to Xray…'));\n  setTimeout(()=>{\n    const exec = pushExec.mode === 'existing' && pushExec.key ? pushExec.key : 'AML-E' + (2000 + rid(900));\n    pushExec.key = exec;\n    const rows = mapping.map(m=>({ name:m.name, status: m.status==='skip'?'skip':(m.status==='create'?'created':'pushed') }));\n    renderPushBody(getTest(selectedId), { exec, rows });\n    $('sbXray').textContent = 'xray: pushed → ' + exec;\n    toast('Pushed execution ' + exec + ' → plan ' + XRAY_CFG.plan);\n  }, 1400);\n}\n\n/* ---------------- New Test creation ---------------- */\nfunction openNewTest() {\n  const draft = { name:'', method:'POST', path:'/aml/v2/', owner:'risk-platform', priority:'med',\n    tags:'', starter:true, linkXray:false, xrayKey:'' };\n  openModal({\n    title:'New test', subtitle:'Adds a Relay test under AML / verify',\n    build(body) {\n      body.append(frow('Test name',\n        h('input', { type:'text', placeholder:'Verify Individual', oninput:(e)=>draft.name=e.target.value }),\n        'Becomes the test id <span class=\"mono\">relay-&lt;slug&gt;<\u002Fspan> and source file.'));\n      const methodSel = h('select', {}, ...['GET','POST','PUT','PATCH','DELETE','HEAD','OPTIONS'].map(m=>{\n        const o=h('option',{value:m},m); if(m===draft.method)o.selected=true; return o; }));\n      methodSel.onchange = e=>draft.method=e.target.value;\n      body.append(h('div', { class:'frow two' },\n        frow('Method', methodSel),\n        frow('Collection / folder', h('select', {}, h('option',{},'AML / verify')))));\n      body.append(frow('Endpoint',\n        h('input', { type:'text', class:'mono', value:draft.path, oninput:(e)=>draft.path=e.target.value }),\n        'Prefixed with <span class=\"mono\">{{baseUrl}}<\u002Fspan> at run time.'));\n      const prioSel = h('select', {}, ...[['low','Low'],['med','Medium'],['high','High']].map(([v,l])=>{\n        const o=h('option',{value:v},l); if(v===draft.priority)o.selected=true; return o; }));\n      prioSel.onchange = e=>draft.priority=e.target.value;\n      body.append(h('div', { class:'frow two' },\n        frow('Owner / component', h('input', { type:'text', class:'mono', value:draft.owner, oninput:(e)=>draft.owner=e.target.value })),\n        frow('Priority', prioSel)));\n      body.append(frow('Tags', h('input', { type:'text', class:'mono', placeholder:'smoke, regression', oninput:(e)=>draft.tags=e.target.value }),\n        'Comma separated.'));\n      body.append(h('label', { class:'ckbtn' },\n        h('input', { type:'checkbox', checked:draft.starter, onchange:(e)=>draft.starter=e.target.checked }),\n        'Seed starter assertions (status is 2xx · $.result.status equals VERIFIED)'));\n      const keyWrap = h('div', { style:'margin-top:8px;display:none' },\n        h('input', { type:'text', class:'mono', placeholder:'AML-T142', style:'width:100%', oninput:(e)=>draft.xrayKey=e.target.value }));\n      body.append(h('label', { class:'ckbtn' },\n        h('input', { type:'checkbox', onchange:(e)=>{ draft.linkXray=e.target.checked; keyWrap.style.display=e.target.checked?'block':'none'; } }),\n        'Link an existing Xray test now'), keyWrap);\n    },\n    actions(foot) {\n      foot.append(h('button', { class:'btn', onclick:closeModal }, 'Cancel'),\n        h('button', { class:'btn dark', onclick:()=>{\n          if (!draft.name.trim()) { toast('Enter a test name', true); return; }\n          const key = draft.linkXray ? draft.xrayKey.trim().toUpperCase() : '';\n          if (key) XRAY_EXISTING.add(key);\n          const t = {\n            id:'relay-'+(slug(draft.name)||'test-'+rid()), name:draft.name.trim(), method:draft.method,\n            path:draft.path.trim(), enabled:true, owner:draft.owner.trim()||'unassigned', priority:draft.priority,\n            src:'collections/aml/'+(slug(draft.name)||'test')+'.req.toml',\n            tags:draft.tags.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean),\n            xray:key, reqs:[], plan:'', set:'',\n            assertions: draft.starter ? [\n              { type:'status', op:'is2xx', exp:'2xx', res:null, desc:'HTTP status is 2xx' },\n              { type:'json', path:'$.result.status', op:'equals', exp:'VERIFIED', res:null, desc:'$.result.status equals VERIFIED' },\n            ] : [],\n            run:null,\n          };\n          SUITE.tests.push(t); closeModal(); select(t.id); toast('Created test ' + t.name);\n        } }, 'Create test'));\n    },\n  });\n}\n\n/* ---------------- Export modal ---------------- */\nfunction buildExport(fmt, opts) {\n  let tests = scopeCount();\n  if (!opts.passed) tests = tests.filter(t => !(t.run && t.run.status === 'pass'));\n  const verdict = t => !t.run ? 'untested' : (t.run.status === 'fail' ? 'failed' : 'passed');\n  if (fmt === 'cel') return buildCelYaml(tests);\n  if (fmt === 'junit') {\n    const fails = tests.reduce((n,t)=> n + (t.run && t.run.status==='fail' ? 1 : 0), 0);\n    let x = '<?xml version=\"1.0\" encoding=\"UTF-8\"?>\\n';\n    x += `<testsuite name=\"AML / verify\" tests=\"${tests.length}\" failures=\"${fails}\" timestamp=\"2026-06-19T09:48:00\">\\n`;\n    for (const t of tests) {\n      const ms = t.run ? (t.run.ms/1000).toFixed(3) : '0';\n      x += `  <testcase classname=\"${t.xray||t.id}\" name=\"${t.name}\" time=\"${ms}\">\\n`;\n      for (const a of t.assertions) if (a.res === 'bad')\n        x += `    <failure message=\"${(a.err||a.desc).replace(/\"/g,'&quot;')}\">${a.desc}<\u002Ffailure>\\n`;\n      if (!t.run) x += `    <skipped/>\\n`;\n      x += `  <\u002Ftestcase>\\n`;\n    }\n    return x + '<\u002Ftestsuite>\\n';\n  }\n  if (fmt === 'json') {\n    return JSON.stringify(tests.map(t => ({\n      id:t.id, name:t.name, method:t.method, endpoint:'{{baseUrl}}'+t.path, xrayTest:t.xray||null,\n      result: verdict(t), http:t.run?t.run.code:null, durationMs:t.run?t.run.ms:null, env:t.run?t.run.env:null,\n      assertions: t.assertions.map(a => ({ type:a.type, condition:a.desc, status: a.res==='ok'?'pass':a.res==='bad'?'fail':'not-run',\n        ...(opts.diagnostics && a.err ? { message:a.err } : {}) })),\n    })), null, 2);\n  }\n  // xray cloud import format\n  return JSON.stringify({\n    testExecutionKey: pushExec.mode==='existing' && pushExec.key ? pushExec.key : null,\n    info: { summary:'AML verify regression run', project:XRAY_CFG.project, testPlanKey:XRAY_CFG.plan,\n            testEnvironments:[ (getTest(selectedId).run||{}).env || 'Staging' ] },\n    tests: tests.map(t => ({\n      testKey: t.xray || undefined,\n      status: !t.run ? 'TODO' : (t.run.status==='fail' ? 'FAILED' : 'PASSED'),\n      comment: opts.diagnostics ? t.assertions.filter(a=>a.res==='bad').map(a=>a.err).join('; ') || undefined : undefined,\n    })),\n  }, null, 2);\n}\nfunction buildCelYaml(tests) {\n  let y = '# Relay test suite — AML / verify\\n# Visual assertions compiled to CEL, stored as diffable YAML\\nsuite: AML / verify\\ntests:\\n';\n  for (const t of tests) {\n    y += '  - id: ' + t.id + '\\n';\n    y += '    name: ' + JSON.stringify(t.name) + '\\n';\n    y += '    request: ' + t.method + ' {{baseUrl}}' + t.path + '\\n';\n    if (t.xray) y += '    xray: ' + t.xray + '\\n';\n    if (t.tags.length) y += '    tags: [' + t.tags.join(', ') + ']\\n';\n    const preds = t.assertions.filter(a => a.type !== 'script').map(toCEL).filter(Boolean);\n    y += '    assert:\\n';\n    if (preds.length) preds.forEach(p => { y += '      - ' + p.replace(/\\n/g, ' ') + '\\n'; });\n    else y += '      []\\n';\n    const scripts = t.assertions.filter(a => a.type === 'script' && a.code);\n    if (scripts.length) { y += '    script: |\\n'; scripts.forEach(s => s.code.trim().split('\\n').forEach(l => y += '      ' + l + '\\n')); }\n  }\n  return y;\n}\nfunction openExport(initial) {\n  const state = { fmt: initial || 'junit', passed:true, diagnostics:true };\n  openModal({\n    title:'Export results', subtitle:'Scope: '+scopeCount().length+' test'+(scopeCount().length===1?'':'s')+' ('+runScope+')', wide:true,\n    build(body, box) {\n      const render = () => { const p = box.querySelector('#expPrev'); if (p) p.textContent = buildExport(state.fmt, state); };\n      body.append(frow('Format', segGroup([['junit','JUnit XML'],['json','Relay JSON'],['xray','Xray JSON'],['cel','CEL · YAML']], state.fmt,\n        (v)=>{ state.fmt=v; render(); }, true)));\n      body.append(h('label', { class:'ckbtn' }, h('input', { type:'checkbox', checked:state.passed,\n        onchange:(e)=>{ state.passed=e.target.checked; render(); } }), 'Include passing tests'));\n      body.append(h('label', { class:'ckbtn' }, h('input', { type:'checkbox', checked:state.diagnostics,\n        onchange:(e)=>{ state.diagnostics=e.target.checked; render(); } }), 'Include failure diagnostics'));\n      body.append(h('div', { class:'flbl', style:'margin-top:12px' }, 'Preview'));\n      body.append(h('pre', { id:'expPrev', class:'codePrev' }, buildExport(state.fmt, state)));\n    },\n    actions(foot, box) {\n      const ext = { junit:'xml', json:'json', xray:'json', cel:'yaml' }, type = { junit:'application/xml', json:'application/json', xray:'application/json', cel:'text/yaml' };\n      foot.append(h('button', { class:'btn', onclick:()=>{\n        navigator.clipboard && navigator.clipboard.writeText(box.querySelector('#expPrev').textContent);\n        toast('Copied to clipboard'); } }, 'Copy'),\n        h('button', { class:'btn dark', onclick:()=>{\n          const name = 'aml-verify.' + ({junit:'junit.xml', json:'results.json', xray:'xray.json', cel:'suite.yaml'})[state.fmt];\n          download(name, box.querySelector('#expPrev').textContent, type[state.fmt]);\n          toast('Downloaded ' + name); closeModal(); } }, 'Download'));\n    },\n  });\n}\n\n/* ---------------- Xray / Jira connection config ---------------- */\nfunction openXrayConfig() {\n  const d = { ...XRAY_CFG };\n  openModal({\n    title:'Xray / Jira connection', subtitle:'Credentials are stored locally in Relay', wide:true,\n    build(body, box) {\n      body.append(h('div', { class:'fsec' }, 'Jira'));\n      body.append(frow('Jira base URL', h('input', { type:'text', class:'mono', value:d.jiraUrl, oninput:(e)=>d.jiraUrl=e.target.value }),\n        'e.g. <span class=\"mono\">https://your-org.atlassian.net<\u002Fspan>'));\n      body.append(h('div', { class:'frow two' },\n        frow('Account email', h('input', { type:'email', class:'mono', value:d.email, oninput:(e)=>d.email=e.target.value })),\n        frow('Jira API token', h('input', { type:'password', class:'mono', value:d.apiToken, placeholder:'••••••••', oninput:(e)=>d.apiToken=e.target.value }))));\n\n      body.append(h('div', { class:'fsec' }, 'Xray authentication'));\n      body.append(frow('Deployment', segGroup([['cloud','Xray Cloud (client id / secret)'],['server','Server / DC (API key)']],\n        d.auth, (v)=>{ d.auth=v; renderAuth(); }, true)));\n      const authBox = h('div'); body.append(authBox);\n      function renderAuth() {\n        authBox.innerHTML = '';\n        if (d.auth === 'cloud') {\n          authBox.append(h('div', { class:'frow two' },\n            frow('Client ID', h('input', { type:'text', class:'mono', value:d.clientId, oninput:(e)=>d.clientId=e.target.value })),\n            frow('Client secret', h('input', { type:'password', class:'mono', value:d.clientSecret, placeholder:'••••••••', oninput:(e)=>d.clientSecret=e.target.value }))));\n        } else {\n          authBox.append(frow('Xray API key', h('input', { type:'password', class:'mono', value:d.apiKey, placeholder:'••••••••', oninput:(e)=>d.apiKey=e.target.value }),\n            'Personal access token from your Xray Server / Data Center instance.'));\n        }\n      }\n      renderAuth();\n\n      body.append(h('div', { class:'fsec' }, 'Defaults for new issues'));\n      body.append(h('div', { class:'frow three' },\n        frow('Project key', h('input', { type:'text', class:'mono', value:d.project, oninput:(e)=>d.project=e.target.value })),\n        frow('Test plan', h('input', { type:'text', class:'mono', value:d.plan, oninput:(e)=>d.plan=e.target.value })),\n        frow('Test set', h('input', { type:'text', class:'mono', value:d.testSet, oninput:(e)=>d.testSet=e.target.value }))));\n      body.append(h('div', { class:'fhint' }, 'New Test, Test Set, Test Execution and Test Plan issues are created in this project and linked automatically.'));\n      body.append(h('div', { id:'connSlot', style:'margin-top:14px' },\n        h('span', { class:'connLine '+(XRAY_CFG.connected?'ok':'idle') }, h('span',{class:'d'}),\n          XRAY_CFG.connected ? 'Connected · Xray Cloud · project '+XRAY_CFG.project : 'Not connected')));\n    },\n    actions(foot, box) {\n      foot.append(h('button', { class:'btn', onclick:()=>{\n        const slot = box.querySelector('#connSlot'); slot.innerHTML='';\n        slot.append(h('span',{class:'connLine idle'},h('span',{class:'d'}),'Testing connection…'));\n        const ok = d.jiraUrl.trim() && d.email.trim() && (d.auth==='cloud' ? d.clientId.trim() : d.apiKey.trim());\n        setTimeout(()=>{ slot.innerHTML='';\n          slot.append(h('span',{class:'connLine '+(ok?'ok':'bad')},h('span',{class:'d'}),\n            ok ? 'Connected · '+(d.auth==='cloud'?'Xray Cloud':'Xray Server')+' · project '+(d.project||'—') : 'Missing required credentials'));\n        }, 850);\n      } }, 'Test connection'),\n        h('span', { class:'grow' }),\n        h('button', { class:'btn', onclick:closeModal }, 'Cancel'),\n        h('button', { class:'btn dark', onclick:()=>{\n          if (!d.jiraUrl.trim() || !d.email.trim()) { toast('Jira URL and email are required', true); return; }\n          Object.assign(XRAY_CFG, d, { connected:true });\n          updateXrayStatus(); closeModal(); renderMain(); renderMeta(); toast('Saved Xray connection');\n        } }, 'Save connection'));\n    },\n  });\n}\nfunction updateXrayStatus() {\n  $('sbXray').textContent = 'xray: ' + (XRAY_CFG.connected ? 'connected ('+XRAY_CFG.project+')' : 'not connected');\n}\n\n/* ---------------- Create Xray issue (Test / Set / Execution / Plan) ---------------- */\nfunction openCreateIssue(t) {\n  const d = { type:'Test', summary:t.name, addThis:true };\n  openModal({\n    title:'Create Xray issue', subtitle:'In project '+XRAY_CFG.project+' · '+(XRAY_CFG.connected?'connected':'not connected'),\n    build(body) {\n      body.append(frow('Issue type', segGroup([['Test','Test'],['Test Set','Test Set'],['Test Execution','Test Execution'],['Test Plan','Test Plan']],\n        d.type, (v)=>{ d.type=v; const c=document.getElementById('linkThisRow'); if(c) c.style.display = v==='Test' ? 'none' : 'flex'; }, true)));\n      body.append(frow('Summary', h('input', { type:'text', value:d.summary, oninput:(e)=>d.summary=e.target.value }),\n        d.type==='Test' ? 'Assertions on this test become Xray test steps.' : ''));\n      body.append(h('label', { id:'linkThisRow', class:'ckbtn', style:'display:none' },\n        h('input', { type:'checkbox', checked:d.addThis, onchange:(e)=>d.addThis=e.target.checked }),\n        'Add \"'+t.name+'\" to the new issue'));\n      body.append(h('div', { class:'fhint' }, 'Created via the Xray GraphQL API and linked to this Relay test. Configure the connection from the Push panel.'));\n    },\n    actions(foot) {\n      foot.append(h('button', { class:'btn', onclick:closeModal }, 'Cancel'),\n        h('button', { class:'btn dark', onclick:()=>{ createIssue(t, d.type, d.summary, d.addThis); closeModal(); } }, 'Create issue'));\n    },\n  });\n}\nfunction createIssue(t, type, summary, addThis) {\n  const pre = { 'Test':'T', 'Test Set':'S', 'Test Execution':'E', 'Test Plan':'P' }[type];\n  const key = XRAY_CFG.project + '-' + pre + rid(900);\n  if (type === 'Test') { XRAY_EXISTING.add(key); t.xray = key; }\n  else if (type === 'Test Set') { if (addThis) t.set = key; }\n  else if (type === 'Test Plan') { if (addThis) t.plan = key; }\n  else if (type === 'Test Execution') { pushExec.mode='existing'; pushExec.key = key; }\n  toast('Created ' + type + ' ' + key + (addThis && type!=='Test' ? ' · linked '+t.name : ''));\n  renderTree(); renderMain(); renderMeta();\n}\n\n/* ---------------- wiring ---------------- */\n$('sideSearch').addEventListener('input', (e)=>{ searchTerm = e.target.value.toLowerCase().trim(); renderTree(); });\n$('newTestBtn').onclick = openNewTest;\n$('dupBtn').onclick = ()=>{ const t=getTest(selectedId); const c={...t, id:t.id+'-copy', name:t.name+' (copy)', assertions:t.assertions.map(a=>({...a})), tags:[...t.tags], reqs:[...t.reqs], run:null}; SUITE.tests.push(c); select(c.id); toast('Duplicated test'); };\n$('perReqBtn').onclick = ()=>toast('Opening '+getTest(selectedId).name+' in request editor → assertions tab');\n$('sbXray').style.cursor = 'pointer';\n$('sbXray').title = 'Configure Xray connection';\n$('sbXray').onclick = openXrayConfig;\ndocument.querySelectorAll('.navItem:not([disabled])').forEach(b=>{\n  b.addEventListener('click', ()=>{\n    if (b.dataset.view === 'tests') return;\n    if (b.dataset.view === 'settings') { openXrayConfig(); return; }\n    toast(b.textContent.trim()+' — switch view (mock)');\n  });\n});\n\nupdateXrayStatus();\nrenderFilters(); renderTree(); renderMain(); renderMeta();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
